# Ore layers — rarity-based spawn (percent ~ vein budget). All types present, not oversaturated.
# Rarity: Diamond 2%, ArtifactFragment 1.5%, Plasma 2.5%, Uranium 2.5%, Gold 3%, Silver 3%,
#         Quartz 4%, Iron 6%, Coal 6%, Salt 5% — relative maxCount / groupSize

- type: biomeMarkerLayer
  id: OreIron
  entityMask:
    AsteroidRock: AsteroidRockTin
    WallRock: WallRockTin
    WallRockBasalt: WallRockBasaltTin
    WallRockChromite: WallRockChromiteTin
    WallRockSand: WallRockSandTin
    WallRockSnow: WallRockSnowTin
  maxCount: 12
  minGroupSize: 2
  maxGroupSize: 5
  radius: 4

