
- type: entity #Goobstation, put here so the X-01 stuff isnt spread everywhere.
  name: magnum bolt
  id: BulletEnergyGunMagnum
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Reflective
    reflective:
    - Energy
  - type: FlyBySound
    sound:
      collection: EnergyMiss
      params:
        volume: 5
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles_tg.rsi
    layers:
    - state: heavylaser
      shader: unshaded
  - type: Ammo
  - type: Physics
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.2,0.2,0.2"
        hard: false
        mask:
        - Opaque
  - type: Projectile
    impactEffect: BulletImpactEffectRedDisabler
    damage:
      types:
#        Blunt: 3 # comment from _Lua
#        Heat: 15
        Shock: 17.5 #Lua
        Caustic: 7.5 #Lua
    soundHit:
      collection: MeatLaserImpact
