# MARK: Recharger

- type: entity
  name: recharger rifle
  parent: [BaseC2ExpeditionContraband, BaseWeaponBattery]
  id: N14WeaponRechargerRifle
  description: The first model for a self charging laser rifle, its low energy consume and advance internal battery makes this gun last for centuries without recharging.
  suffix: Need balance test
  components:
  - type: Sprite
    sprite: _Nuclear14/Objects/Weapons/Guns/Battery/recharger_rifle.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-unshaded-4
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Clothing
    sprite: _Nuclear14/Objects/Weapons/Guns/Battery/recharger_rifle.rsi
  - type: Wieldable #Lua
  - type: GunRequiresWield #Lua
  - type: Battery
    maxCharge: 750
    startingCharge: 750
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 30
  - type: Gun
    minAngle: 1.4 #Lua
    maxAngle: 7 #Lua
    angleIncrease: 5.6 #Lua
    angleDecay: 3.7 #Lua
    fireRate: 3.6 #Lua
    soundGunshot:
      collection: N14RechargerRifleGunshot
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
  - type: HitscanBatteryAmmoProvider
    proto: RedShuttleLaser
    fireCost: 42
  - type: ItemToggle #Lua
    onUse: false
    onActivate: false
    soundActivate:
      path: /Audio/_Lua/Weapons/mantison.wav
      params:
        volume: 3
    soundDeactivate:
      path: /Audio/_Lua/Weapons/mantisoff.wav
      params:
        volume: 3
  - type: ToggleClothing #Lua
    action: ActionToggleScope
    mustEquip: false
  - type: ComponentToggler #Lua
    components:
    - type: ClothingSpeedModifier #Lua
      walkModifier: 0.8
      sprintModifier: 0.8
    - type: CursorOffsetRequiresWield
    - type: EyeCursorOffset
      maxOffset: 10
      pvsIncrease: 1

- type: entity
  name: recharger pistol
  parent: [BaseC1Contraband, BaseWeaponBatterySmall]
  id: N14WeaponRechargerPistol
  description: The upgraded version of the recharger rifle, compact but maintaining the same power, its low energy consume and advance internal battery makes this gun last for centuries without recharging.
  suffix: Need balance test
  components:
  - type: Sprite
    sprite: _Nuclear14/Objects/Weapons/Guns/Battery/recharger_pistol.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-unshaded-4
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Clothing
    sprite: _Nuclear14/Objects/Weapons/Guns/Battery/recharger_pistol.rsi
  - type: Gun
    minAngle: 3.1 #Lua
    maxAngle: 15.5 #Lua
    angleIncrease: 0.7 #Lua
    angleDecay: 5 #Lua
    fireRate: 4.8
    soundGunshot:
      collection: N14RechargerPistolGunshot
  - type: Battery
    maxCharge: 250
    startingCharge: 250
  - type: HitscanBatteryAmmoProvider
    proto: NFRedMediumLaser
    fireCost: 25
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 10
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: true
  - type: Appearance
  - type: Tag
    tags:
    - Sidearm

