- type: entity
  id: N14BaseWeaponPowerCell
  parent: BaseItem
  abstract: true
  components:
  - type: Sprite
  - type: Item
    size: Small
  - type: AmmoCounter
  - type: Gun
    minAngle: 35
    maxAngle: 65
    angleIncrease: 4
    angleDecay: 16
    fireRate: 1
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser.ogg
  - type: MagazineAmmoProvider
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: N14PowerCellHigh
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        whitelist:
          tags:
            - N14PowerCellHigh
            - PowerCell
  - type: Appearance
  - type: StaticPrice
    price: 500
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot

- type: entity
  id: N14BaseWeaponPowerCellSmall
  parent: N14BaseWeaponPowerCell
  abstract: true
  components:
  - type: Clothing
    sprite: Objects/Weapons/Guns/Battery/taser.rsi
    quickEquip: false
    slots:
    - Belt
  - type: Gun
    minAngle: 10
    maxAngle: 20

- type: entity
  id: N14BaseWeaponPowerCellMedium
  parent: N14BaseWeaponPowerCell
  abstract: true
  components:
  - type: Item
    size: Normal
  - type: Clothing
    sprite: Objects/Weapons/Guns/Battery/taser.rsi
    quickEquip: false
    slots:
    - Belt

# MARK: Pistols
- type: entity
  name: AEP-7 laser pistol
  parent: [BaseC2Contraband, N14BaseWeaponPowerCellSmall]
  id: N14WeaponLaserPistol
  description: A basic energy-based laser gun that fires concentrated beams of light.
  suffix: Need balance test
  components:
  - type: Sprite
    sprite: _Nuclear14/Objects/Weapons/Guns/Battery/laser_pistol.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-unshaded-4
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
