- type: entity
  name: automatic rifle
  parent: [BaseC2ExpeditionContraband, BaseWeaponRifle]
  id: N14WeaponAutoRifle
  description: A high caliber long and heavy machine gun of the pre-war, chambered in the powerfull 308.
  suffix: Need balance test
  components:
  - type: Clothing
    sprite: _Nuclear14/Objects/Weapons/Guns/LMGs/autorifle.rsi
  - type: Sprite
    sprite: _Nuclear14/Objects/Weapons/Guns/LMGs/autorifle.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    shape: #Lua
    - 0,0,4,3
    sprite: _Nuclear14/Objects/Weapons/Guns/LMGs/autorifle.rsi
  - type: Wieldable
#  - type: GunWieldBonus #comment from _Lua
#    minAngle: -22
#    maxAngle: -59
  - type: GunRequiresWield #Lua
  - type: Gun
#    minAngle: 24 # comment from _Lua
#    maxAngle: 60
#    angleIncrease: 4
#    angleDecay: 16
    minAngle: 3 #Lua
    maxAngle: 15 #Lua
    angleIncrease: 1.3 #Lua
    angleDecay: 4.7 #Lua
    fireRate: 5.6 #Lua 4<5.6
    soundGunshot:
      collection: N14AutoRifleGunshot
    selectedMode: FullAuto
    availableModes:
    - FullAuto
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine68x52mmCaselessBig #Lua Magazine308Rifle<Magazine68x52mmCaselessBig
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - Magazine68x52mmCaseless #Lua N14Magazine308Rifle<Magazine68x52mmCaseless
      gun_chamber:
        name: Chamber
        startingItem: Cartridge68x52mmCaseless #Lua N14Cartridge308Rifle<Cartridge68x52mmCaseless
        priority: 1
        whitelist:
          tags:
            - Cartridge68x52mmCaseless #Lua N14Cartridge308Rifle<Cartridge68x52mmCaseless
  - type: ClothingSpeedModifier
    walkModifier: 0.8
    sprintModifier: 0.8
  - type: HeldSpeedModifier
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance

- type: entity
  name: light machine gun
  parent: BaseWeaponRifle
  id: N14WeaponLMG
  description: A light machine gun designed by the NCR for their heavy troops, sometimes gived to the troops in low numbers, chambered in 5.56.
  suffix: Need balance test
  components:
  - type: Clothing
    sprite: _Nuclear14/Objects/Weapons/Guns/LMGs/lmg.rsi
  - type: Sprite
    sprite: _Nuclear14/Objects/Weapons/Guns/LMGs/lmg.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    shape: #Lua
    - 0,0,4,3
    sprite: _Nuclear14/Objects/Weapons/Guns/LMGs/lmg.rsi
  - type: Wieldable
  - type: GunRequiresWield
#  - type: GunWieldBonus #comment from _Lua
#    minAngle: -20
#    maxAngle: -55
  - type: Gun
    examineCaliber: gun-examine-caliber-865 #Lua
#    minAngle: 24 # comment from _Lua
#    maxAngle: 60
#    angleIncrease: 4
#    angleDecay: 16
    minAngle: 3 #Lua
    maxAngle: 15 #Lua
    angleIncrease: 1.3 #Lua
    angleDecay: 4.7 #Lua
    fireRate: 4.67 #Lua 6<4.67
    soundGunshot:
      collection: N14LMGGunshot
    selectedMode: FullAuto
    availableModes:
    - FullAuto
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine8x65mmSKRBox #Lua LMGMagazine556Rifle<Magazine8x65mmSKRBox
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineBox8x65mmSKR #Lua N14LMGMagazine556Rifle<MagazineBox8x65mmSKR
      gun_chamber:
        name: Chamber
        startingItem: Cartridge8x65mmSKR #Lua N14Cartridge556Rifle<Cartridge8x65mmSKR
        priority: 1
        whitelist:
          tags:
            - Cartridge8x65mmSKR #Lua N14Cartridge556Rifle<Cartridge8x65mmSKR
  - type: ClothingSpeedModifier
    walkModifier: 0.8 #Lua 0.9<0.8
    sprintModifier: 0.8 #Lua 0.9<0.8
  - type: HeldSpeedModifier
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
