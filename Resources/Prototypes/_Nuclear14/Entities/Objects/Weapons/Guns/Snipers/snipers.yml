- type: entity
  name: hunting rifle
  parent: BaseWeaponSniper
  id: N14WeaponSniperHunting
  description: A rugged bolt action rifle. Uses .308 ammo.
  suffix: Need balance test
  components:
  - type: Clothing
    sprite: _Nuclear14/Objects/Weapons/Guns/Snipers/hunting.rsi
  - type: Sprite
    sprite: _Nuclear14/Objects/Weapons/Guns/Snipers/hunting.rsi
  - type: Item
    sprite: _Nuclear14/Objects/Weapons/Guns/Snipers/hunting.rsi
  - type: Wieldable
  - type: ItemToggle #Lua
    onUse: false
    onActivate: false
    soundActivate:
      path: /Audio/_Lua/Weapons/mantison.wav
      params:
        volume: 3
    soundDeactivate:
      path: /Audio/_Lua/Weapons/mantisoff.wav
      params:
        volume: 3
  - type: ToggleClothing #Lua
    action: ActionToggleScope
    mustEquip: false
  - type: ComponentToggler #Lua
    components:
    - type: ClothingSpeedModifier
      walkModifier: 0.8
      sprintModifier: 0.8
    - type: CursorOffsetRequiresWield
    - type: EyeCursorOffset
      maxOffset: 10
      pvsIncrease: 1
  - type: GunRequiresWield #Lua
  - type: GunWieldBonus
    minAngle: -23
    maxAngle: -104
  - type: Gun
    minAngle: 24
    maxAngle: 105
    angleIncrease: 4
    angleDecay: 16
    fireRate: 1.5
    soundGunshot:
      collection: N14SniperHuntingGunshot
  - type: BallisticAmmoProvider
    whitelist:
      tags:
      - N14Cartridge308Rifle
    capacity: 10
    proto: N14Cartridge308Rifle

- type: entity
  name: Anti-Materiel rifle
  parent: [BaseC3SyndicateContraband, BaseWeaponRifle]
  id: N14WeaponAntiMateriel
  description: A anti materiel rifle with a ergonomic, metallic skeleton design. only seeing at it you can tell it will rip some limbs apart. Uses .50 anti-material ammo.
  suffix: Need balance test
  components:
  - type: Clothing
    sprite: _Nuclear14/Objects/Weapons/Guns/Snipers/antimateriel.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: Sprite
    sprite: _Nuclear14/Objects/Weapons/Guns/Snipers/antimateriel.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    shape: #Lua
    - 0,0,4,3
  - type: Wieldable
  - type: GunRequiresWield #Lua
#  - type: GunWieldBonus # comment (78-80; 82-85) from _Lua
#    minAngle: -23
#    maxAngle: -104
  - type: Gun
    examineCaliber: gun-examine-caliber-127 #Lua
#    minAngle: 24
#    maxAngle: 105
#    angleIncrease: 4
#    angleDecay: 16
    minAngle: 20 #Lua # Я ебал эту логику, ставлю нули и мне похуй
    maxAngle: 30 #Lua
    angleIncrease: 0 #Lua
    angleDecay: 0 #Lua
    fireRate: 1 #Lua 1.2<1
    soundGunshot:
      collection: N14AntiMaterielGunshot
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine127x99mm #Lua N14Magazine50AMR<Magazine127x99mm
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - Magazine127x99mm #Lua N14Magazine50AMR<Magazine127x99mm
#            - N14Magazine50AMRHEIAP
      gun_chamber:
        name: Chamber
        startingItem: Cartridge127x99mm #Lua N14Cartridge50<Cartridge127x99mm
        priority: 1
        whitelist:
          tags:
            - Cartridge127x99mm #Lua N14Cartridge50<Cartridge127x99mm
#            - N14Cartridge50HEIAP
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: ItemToggle #Lua
    onUse: false
    onActivate: false
    soundActivate:
      path: /Audio/_Lua/Weapons/mantison.wav
      params:
        volume: 3
    soundDeactivate:
      path: /Audio/_Lua/Weapons/mantisoff.wav
      params:
        volume: 3
  - type: ToggleClothing #Lua
    action: ActionToggleScope
    mustEquip: false
  - type: ComponentToggler #Lua
    components:
    - type: HeldSpeedModifier #Lua
    - type: ClothingSpeedModifier #Lua
      walkModifier: 0.8
      sprintModifier: 0.8
    - type: CursorOffsetRequiresWield
    - type: EyeCursorOffset
      maxOffset: 10
      pvsIncrease: 1

