- type: entity
  name: 9mm revolver
  parent: [BaseC1Contraband, BaseWeaponRevolver]
  id: N14WeaponRevolver9mm
  description: A small, compact six shooter. Uses 9mm ammo.
  components:
  - type: Sprite
    sprite: _Nuclear14/Objects/Weapons/Guns/Revolvers/small_revolver.rsi
  - type: Clothing
    sprite: _Nuclear14/Objects/Weapons/Guns/Revolvers/small_revolver.rsi
  - type: RevolverAmmoProvider
    whitelist:
      tags:
        - N14CartridgePistol9
        - SpeedLoader9
    proto: N14CartridgePistol9
  - type: Gun
    soundGunshot:
      collection: N14Revolver9mmGunshot

- type: entity
  name: 10mm revolver
  parent: [BaseC1Contraband, BaseWeaponRevolver]
  id: N14WeaponRevolver10mm
  description: The first prototype for the semiauto 10mm pistol, Uses 10mm ammo.
  suffix: Need balance test
  components:
  - type: Sprite
    sprite: _Nuclear14/Objects/Weapons/Guns/Revolvers/10mmrevolver.rsi
  - type: Clothing
    sprite: _Nuclear14/Objects/Weapons/Guns/Revolvers/10mmrevolver.rsi
  - type: RevolverAmmoProvider
    whitelist:
      tags:
        - Cartridge45_ACPFMJ #Lua N14CartridgePistol10<Cartridge45_ACPFMJ
        - SpeedLoader10
    proto: Cartridge45_ACPFMJ #Lua N14CartridgePistol10<Cartridge45_ACPFMJ
  - type: Item #Lua
  - type: Gun
    examineCaliber: gun-examine-caliber-45acp #Lua
    minAngle: 3.1 #Lua
    maxAngle: 15.5 #Lua
    angleIncrease: 0.7 #Lua
    angleDecay: 5 #Lua
    fireRate: 5
    soundGunshot:
      collection: N14Revolver10mmGunshot

