- type: entity
  name: 10mm SMG
  parent: [BaseC2ExpeditionContraband, BaseWeaponSubMachineGun]
  id: N14WeaponSubMachineGun10mm
  description: Fully automatic submachinegun chambered in 10mm.
  suffix: Need balance test
  components:
  - type: Clothing
    sprite: _Nuclear14/Objects/Weapons/Guns/SMGs/10mmSMG.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: Sprite
    sprite: _Nuclear14/Objects/Weapons/Guns/SMGs/10mmSMG.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    shape: #Lua
    - 0,0,2,1
    sprite: _Nuclear14/Objects/Weapons/Guns/SMGs/10mmSMG.rsi
  - type: Gun
    examineCaliber: gun-examine-caliber-919 #Lua
    minAngle: 3.1 #Lua
    maxAngle: 15.5 #Lua
    angleIncrease: 0.7 #Lua
    angleDecay: 5 #Lua
    fireRate: 7.5 #Lua 8<7.5
    soundGunshot:
      collection: N14Pistol10mmGunshot
    selectedMode: Fullauto
    availableModes:
    - Fullauto
#    minAngle: 8 #comment from _Lua
#    maxAngle: 48
#    angleIncrease: 6
#    angleDecay: 16
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/_Nuclear14/Weapons/Effects/Reload/SMGs/smg_cock.ogg
#  - type: Wieldable #comment from _Lua
#  - type: GunWieldBonus
#    minAngle: -7
#    maxAngle: -15
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine9x19mmSubMachineGunFMJ #Lua N14MagazineSMG10mm<Magazine9x19mmSubMachineGunFMJ
        insertSound: /Audio/_Nuclear14/Weapons/Effects/Reload/SMGs/smg_magin.ogg
        ejectSound: /Audio/_Nuclear14/Weapons/Effects/Reload/SMGs/smg_magout.ogg
        whitelist:
          tags:
            - Magazine9x19mmSubMachineGunFMJ #Lua N14MagazineSMG10mm<Magazine9x19mmSubMachineGunFMJ
      gun_chamber:
        name: Chamber
        startingItem: Cartridge9x19mmFMJ #Lua N14CartridgePistol10<Cartridge9x19mmFMJ
        priority: 1
        whitelist:
          tags:
            - Cartridge9x19mmFMJ #Lua N14CartridgePistol10<Cartridge9x19mmFMJ
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance

