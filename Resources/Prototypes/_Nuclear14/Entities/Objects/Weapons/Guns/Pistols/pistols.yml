- type: entity
  name: N14BasePistol
  parent: BaseItem
  id: N14BaseWeaponPistol
  description: A rooty tooty point and shooty.
  abstract: true
  components:
  - type: AmmoCounter
  - type: Sprite
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    size: Small
  - type: Clothing
    sprite: Objects/Weapons/Guns/Pistols/viper.rsi
    quickEquip: false
    slots:
    - suitStorage
    - Belt
  - type: Gun
    minAngle: 2 #Lua
    maxAngle: 16 #Lua
    angleIncrease: 1.1 #Lua
    angleDecay: 7.7 #Lua
    fireRate: 6
    selectedMode: SemiAuto
    availableModes:
      - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/pistol.ogg
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/_Nuclear14/Weapons/Effects/Reload/Pistols/pistol_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazinePistol
        insertSound: /Audio/_Nuclear14/Weapons/Effects/Reload/Pistols/pistol_magin.ogg
        ejectSound: /Audio/_Nuclear14/Weapons/Effects/Reload/Pistols/pistol_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazinePistol
      gun_chamber:
        name: Chamber
        startingItem: CartridgePistol
        priority: 1
        whitelist:
          tags:
            - CartridgePistol
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice
    price: 500

- type: entity
  name: 9mm Pistol
  parent: [BaseC1Contraband, N14BaseWeaponPistol]
  id: N14WeaponPistol9mm
  description: A cheap, ubiquitous sidearm, chambered in 9 mm.
  suffix: Need balance test
  components:
  - type: Sprite
    sprite: _Nuclear14/Objects/Weapons/Guns/Pistols/9mm.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    sprite: _Nuclear14/Objects/Weapons/Guns/Pistols/9mm.rsi
  - type: Gun
    examineCaliber: gun-examine-caliber-919 #Lua
    minAngle: 3.1 #Lua
    maxAngle: 15.5 #Lua
    angleIncrease: 0.7 #Lua
    angleDecay: 5 #Lua
    fireRate: 6 #Lua 5<6
    projectileSpeed: 30 #Lua
    soundGunshot:
      collection: N14Pistol9mmGunshot
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine9x19mmPistolFMJ #lua N14MagazinePistol9mm<Magazine9x19mmPistolFMJ
        whitelist:
          tags:
            - Magazine9x19mmPistolFMJ #Lua N14MagazinePistol9mm<Magazine9x19mmPistolFMJ
      gun_chamber:
        name: Chamber
        startingItem: Cartridge9x19mmFMJ #Lua N14CartridgePistol9<Cartridge9x19mmFMJ
        priority: 1
        whitelist:
          tags:
            - Cartridge9x19mmFMJ #Lua N14CartridgePistol9<Cartridge9x19mmFMJ

