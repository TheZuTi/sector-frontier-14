- type: entity
  name: R-91
  parent: [BaseC2ExpeditionContraband, BaseWeaponRifle]
  id: N14WeaponRifleR91
  description: An old fashioned assault rifle chambered in 5.56.
  suffix: Need balance test
  components:
  - type: Clothing
    sprite: _Nuclear14/Objects/Weapons/Guns/Rifles/r91.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: Sprite
    sprite: _Nuclear14/Objects/Weapons/Guns/Rifles/r91.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    shape: #Lua
    - 0,0,3,2
    sprite: _Nuclear14/Objects/Weapons/Guns/Rifles/r91.rsi
  - type: Wieldable
#  - type: GunWieldBonus #comment from _Lua
#    minAngle: -21
#    maxAngle: -38
  - type: GunRequiresWield #Lua
  - type: Gun
    examineCaliber: gun-examine-caliber-55645 #Lua
#    minAngle: 24 # comment from _Lua
#    maxAngle: 45
#    angleIncrease: 4
#    angleDecay: 16
    minAngle: 20 #Lua # Я ебал эту логику, ставлю нули и мне похуй
    maxAngle: 30 #Lua
    angleIncrease: 0 #Lua
    angleDecay: 0 #Lua
    fireRate: 4.8 #Lua
    soundGunshot:
      collection: N14RifleR91Gunshot
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine556x45mmFMJ #Lua Magazine556Rifle<Magazine556x45mmFMJ
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - Magazine556x45mmFMJ #Lua Magazine556Rifle<Magazine556x45mmFMJ
      gun_chamber:
        name: Chamber
        startingItem: Cartridge556x45mmFMJ #Lua N14Cartridge556Rifle<Cartridge556x45mmFMJ
        priority: 1
        whitelist:
          tags:
            - Cartridge556x45mmFMJ #Lua N14Cartridge556Rifle<Cartridge556x45mmFMJ
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance

