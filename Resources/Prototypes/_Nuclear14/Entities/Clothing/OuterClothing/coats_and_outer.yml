#MARK: Base Entity
- type: entity
  abstract: true
  parent: [Clothing, AllowSuitStorageClothing]
  id: N14ClothingOuterBase
  components:
  - type: Clothing
    slots:
    - outerClothing
  - type: Sprite
    state: icon
  - type: Storage
    grid:
    - 0,0,2,1
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface

- type: entity
  parent: N14ClothingOuterBase
  id: N14ClothingOuterMaskmanCoat
  name: marksman coat
  description: A thick, lightly padded green winter hoodie. Warm and might just save your life!
  components:
  - type: Sprite
    sprite: _Nuclear14/Clothing/OuterClothing/Coats/MaskmanCoat.rsi
  - type: Clothing
    sprite: _Nuclear14/Clothing/OuterClothing/Coats/MaskmanCoat.rsi
  - type: Armor
    modifiers:
     coefficients:
        Blunt: 0.85
        Slash: 0.85
        Piercing: 0.8
        Heat: 0.85
    priceMultiplier: 0.5

#MARK: Brotherhood
- type: entity
  parent: N14ClothingOuterBase
  id: N14ClothingOuterBrotherhoodFieldScribeCoat
  name: Brotherhood field Cleric coat
  description: A warm coat worn by Brotherhood Clerics on the field.
  components:
  - type: Sprite
    sprite: _Nuclear14/Clothing/OuterClothing/Coats/brotherhoodfieldscribe.rsi
  - type: Clothing
    sprite: _Nuclear14/Clothing/OuterClothing/Coats/brotherhoodfieldscribe.rsi

- type: entity
  parent: N14ClothingOuterBase
  id: N14ClothingOuterSlickCoat6
  name: Slick coat
  description: A pretty slick coat
  components:
  - type: Sprite
    sprite: _Nuclear14/Clothing/OuterClothing/Coats/slick6.rsi
  - type: Clothing
    sprite: _Nuclear14/Clothing/OuterClothing/Coats/slick6.rsi
  - type: Armor
    modifiers:
     coefficients:
        Blunt: 0.85
        Slash: 0.85
        Piercing: 0.8
        Heat: 0.85
    priceMultiplier: 0.5
