- type: shader
  id: SelectionOutline
  kind: source
  path: "/Textures/Shaders/outline.swsl"
  params:
    outline_color: "#FF000055"
    light_boost: 2
    light_gamma: 1.5
    light_whitepoint: 48

- type: shader
  id: SelectionOutlineInrange
  kind: source
  path: "/Textures/Shaders/outline.swsl"
  params:
    outline_color: "#00FF0055"
    light_boost: 2
    light_gamma: 0.9
    light_whitepoint: 1

# Mono
- type: shader
  id: ShieldingOutline
  kind: source
  path: "/Textures/Shaders/outline.swsl"
  params:
    outline_width: 1.7
    outline_color: "#00AAFF88"
    outline_fullbright: true
