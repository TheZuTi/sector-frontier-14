- type: entity
  name: VFD MR-8C DMR (7.62x54)
  parent: [BaseWeaponRifle, BaseC3CentCommContraband] #Lua BaseGunWieldable
  id: WeaponRifleMR8C
  description: The DMR variant of the MR-8 series, firing with incredible accuracy. Chambered in 8x65mm SKR. A label on the side reads "FOR MILITARY USE ONLY".
  suffix: Need balance test #Lua
  components:
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Rifles/mr8c.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Wieldable
    unwieldOnUse: false
  - type: ClothingSpeedModifier #Lua%
    walkModifier: 0.7
    sprintModifier: 0.7
  - type: GunRequiresWield
#  - type: GunWieldBonus # comment (17-19) from _Lua
#    minAngle: -21
#    maxAngle: -47
  - type: Gun
    examineCaliber: gun-examine-caliber-76254 #Lua
#    minAngle: 21 # comment from _Lua
#    maxAngle: 48
#    angleIncrease: 27
#    angleDecay: 2
    minAngle: 20 #Lua # Я ебал эту логику, ставлю нули и мне похуй
    maxAngle: 30 #Lua
    angleIncrease: 0 #Lua
    angleDecay: 0 #Lua
    fireRate: 3.6 #Lua 4<3.6
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/heavy_rifle_1.ogg
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/batrifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine762x54mmRFMJ #Lua Magazine8x65mmSKR<Magazine762x54mmRFMJ
        insertSound: /Audio/Weapons/Guns/MagIn/sfrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/hpistol_magout.ogg
        priority: 2
        whitelist:
          tags:
            - Magazine762x54mmRFMJ #Lua Magazine8x65mmSKR<Magazine762x54mmRFMJ
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge762x54mmRFMJ #Lua Cartridge8x65mmSKR<Cartridge762x54mmRFMJ
        priority: 1
        whitelist:
          tags:
            - Cartridge762x54mmRFMJ #Lua Cartridge8x65mmSKR<Cartridge762x54mmRFMJ
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/Rifles/mr8c_inhands_32x.rsi
  - type: Item
    shape: #Lua
    - 0,0,3,2
    sprite: _Mono/Objects/Weapons/Guns/Rifles/mr8c_inhands_32x.rsi
  - type: StaticPrice
    price: 2400
  - type: ItemToggle #Lua
    onUse: false
    onActivate: false
    soundActivate:
      path: /Audio/_Lua/Weapons/mantison.wav
      params:
        volume: 3
    soundDeactivate:
      path: /Audio/_Lua/Weapons/mantisoff.wav
      params:
        volume: 3
  - type: ToggleClothing #Lua
    action: ActionToggleScope
    mustEquip: false
  - type: ComponentToggler #Lua
    components:
    - type: ClothingSpeedModifier #Lua
      walkModifier: 0.8
      sprintModifier: 0.8
    - type: CursorOffsetRequiresWield
    - type: EyeCursorOffset
      maxOffset: 7.5
      pvsIncrease: 1

