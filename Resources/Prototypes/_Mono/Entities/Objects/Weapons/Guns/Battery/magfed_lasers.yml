- type: entity
  name: EM72 Ashstorm
  parent: [MonoBaseWeaponPowerCell, BaseC3CentCommContraband] # Lua-changes: BaseC2ContrabandUnredeemable > BaseC3CentCommContraband
  id: WeaponLaserCellMG
  description: EM72 Ashstorm, The TSF-EM72 Ashstorm is a directed-energy light machine gun developed by Aetherion Dynamics under TSF weapons contract 934A. Designed for sustained suppressive fire in void or planetary combat. The signature green glow of the Ashstorm's thermal capacitors is feared across insurgent lines in the Helion Belt.
  suffix: Need balance test #Lua
  components:
  - type: Item
    size: Huge
    shape:
    - 0,0,4,3
  - type: Wieldable
  - type: GunRequiresWield #Lua
#  - type: GunWieldBonus # comment from _Lua
#    minAngle: -19
#    maxAngle: -16
  - type: Gun
#    minAngle: 23 # comment from _Lua
#    maxAngle: 20
    minAngle: 3 #Lua
    maxAngle: 15 #Lua
    angleIncrease: 1.3 #Lua
    angleDecay: 4.7 #Lua
    fireRate: 7.2 #Lua 10<7.2
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser_cannon.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MilitaryPowerCellMG
        whitelist:
          tags:
          - MilitaryPowerCellMG
  - type: HitscanBatteryAmmoProvider
    proto: MediumOverchargedLaser
    fireCost: 25
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Battery/cell_mg.rsi
    layers:
    - state: icon
      visible: false
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-4
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: true
  - type: SpeedModifiedOnWield
    walkModifier: 0.7 #Lua 0.80<0.7
    sprintModifier: 0.7 #Lua 0.80<0.7
  - type: PhysicalComposition
    materialComposition:
      Steel: 500
      Gold: 125
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/Battery/cell_mg.rsi
    quickEquip: false
    slots:
    - back
    - suitStorage
  - type: AmmoCounter

- type: entity
  name: NT-WS LRC-21 PPL
  parent: [MonoBaseWeaponPowerCell, BaseGunWieldable, BaseC3CentCommContraband] # Lua-changes: BaseC2ContrabandUnredeemable > BaseC3CentCommContraband
  id: WeaponLRC21PPL
  description: A heavy pulsed plasma lance rifle. Eviscerates targets with ease.
  suffix: Need balance test #Lua
  components:
  - type: Wieldable
#  - type: GunWieldBonus # comment from _Lua
#    minAngle: -23
#    maxAngle: -62
  - type: GunRequiresWield #Lua
  - type: Gun
#    minAngle: 23 # comment from _Lua
#    maxAngle: 64
    minAngle: 20 #Lua # Я ебал эту логику, ставлю нули и мне похуй
    maxAngle: 30 #Lua
    angleIncrease: 0 #Lua
    angleDecay: 0 #Lua
    fireRate: 1.2 #Lua 0.7<1.2
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/ship_perforator.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: PulsedPlasmaLaserCanister
        whitelist:
          tags:
          - PPLCell
  - type: HitscanBatteryAmmoProvider
    proto: PulsedPlasma
    fireCost: 1200 #Lua 3000<1200
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Battery/lrc21.rsi
    layers:
    - state: icon
      visible: false
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
      visible: false
      shader: unshaded
