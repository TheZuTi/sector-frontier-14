    sprite: _Mono/Objects/Weapons/Guns/Battery/nt_longarm_inhands_32x.rsi
    size: Huge
#    shape:
#    - 0,0,5,2
    shape: #Lua
    - 0,0,4,3
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/Battery/nt_longarm_inhands_32x.rsi
    quickEquip: false
    slots:
    - back
    - suitStorage
  - type: AmmoCounter
  - type: ItemToggle #Lua
    onUse: false
    onActivate: false
    soundActivate:
      path: /Audio/_Lua/Weapons/mantison.wav
      params:
        volume: 3
    soundDeactivate:
      path: /Audio/_Lua/Weapons/mantisoff.wav
      params:
        volume: 3
  - type: ToggleClothing #Lua
    action: ActionToggleScope
    mustEquip: false
  - type: ComponentToggler #Lua
    components:
    - type: ClothingSpeedModifier #Lua
      walkModifier: 0.8
      sprintModifier: 0.8
    - type: CursorOffsetRequiresWield
    - type: EyeCursorOffset
      maxOffset: 10
      pvsIncrease: 1
#  - type: CursorOffsetRequiresWield # comment from _Lua
#  - type: EyeCursorOffset
#    maxOffset: 12
#    pvsIncrease: 4
  - type: SpeedModifiedOnWield
    walkModifier: 0.6 #Lua 0.95 -> 0.6
    sprintModifier: 0.6 #Lua 0.95 -> 0.6
  - type: Appearance