- type: entity
  abstract: true
  parent: [BaseItem, RecyclableItemCardboard] # Frontier: added RecyclableItemCardboard
  id: BaseAmmoBox8x65mm
  suffix: Need balance test #Lua
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - Cartridge8x65mmSKR
    proto: Cartridge8x65mmSKR
    capacity: 100
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
#  - type: Sprite
#    sprite: _Mono/Objects/Weapons/Guns/Ammunition/Boxes/8x65mm.rsi
#  - type: MagazineVisuals
#    magState: mag
#    steps: 5
#    zeroVisible: false
  - type: Appearance
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Goobstation/Items/handling/ammobox_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_Goobstation/Items/handling/ammobox_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_Goobstation/Items/handling/ammobox_drop.ogg

# Boxes
# Standart
- type: entity
  parent: BaseAmmoBox8x65mm
  id: AmmoBox8x65mmSKR
  name: ammunition box (8x65mm SKR FMJ)
  suffix: Need balance test #Lua
  components:
  - type: BallisticAmmoProvider
    proto: Cartridge8x65mmSKR
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Ammunition/Boxes/8x65mm.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]

