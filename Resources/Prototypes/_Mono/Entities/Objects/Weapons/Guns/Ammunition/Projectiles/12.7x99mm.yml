# Damage-per-second = 150 for bolt-action rifles; 150-25 = 125 for caustic ammo; max COO = 1.5
# Main damage type - Piercing for standart; main damage/special damage = 70/30 for special
# Structural DPS = 600 for bolt-action rifles; Damage for projectile = 600/1.5 = 400
# LeptonComm status clear
# Standart
- type: entity
  categories: [ HideSpawnMenu ]
  parent: BaseBullet
  id: Bullet127x99mm
  name: bullet (12.7x99mm anti-material)
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 100
        Structural: 400 # if you were a wall would you like having a .50 cal anti materiel round go through you (this breaks a normal wall in 3 shots, one mag goes through four normal walls, 10 rounds to take down a reinforced wall)
  - type: Tracer
    color: "#FFFFFFFF"
    length: 3

# Mechanical
- type: entity
  categories: [ HideSpawnMenu ]
  parent: BaseBulletTrigger
  id: Bullet127x99mmExplosive
  name: bullet (12.7x99mm high-explosive)
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 10
        Heat: 8
        Structural: 20
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    maxIntensity: 2
    intensitySlope: 2
    totalIntensity: 18 # 30 damage per tile
    maxTileBreak: 0
  - type: PointLight
    radius: 3.5
    color: orange
    energy: 0.5
  - type: Sprite
    noRot: false
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
    - state: bullet
      shader: unshaded
  - type: Tracer
    color: "#FFFFFFFF"
    length: 3

