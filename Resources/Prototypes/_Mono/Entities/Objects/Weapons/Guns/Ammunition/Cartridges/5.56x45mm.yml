- type: entity
  id: BaseCartridge556x45mm
  name: cartridge (5.56x45mm FMJ)
  suffix: Need balance test #Lua
  parent: [ BaseCartridge, BaseC1Contraband ] # Frontier: BaseSecurityContraband<BaseC1Contraband
  description: An extremely-common intermediate cartridge for rifles.
  abstract: true
  components:
  - type: Tag
    tags:
      - Cartridge
      - Cartridge556x45mmFMJ
  - type: CartridgeAmmo
    deleteOnSpawn: true
    proto: Bullet556x45mmFMJ
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Casings/ammo_casing.rsi
    layers:
    - state: base
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: StaticPrice
    price: 1

