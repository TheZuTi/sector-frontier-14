# Base
- type: entity
  id: BaseMagazine8x65mmBox
  name: SAW box (8x65mm SKR)
  suffix: Need balance test #Lua
  parent: [BaseItem, RecyclableItemSteelTiny] # Frontier: added RecyclableItemSteelTiny
  abstract: true
  components:
  - type: Tag
    tags:
    - MagazineBox8x65mmSKR
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
      - Cartridge8x65mmSKR
    capacity: 75 #Lua 100<75
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Ammunition/Magazine/8x65mm/8x65mm_box.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance

