- type: entity
  id: BaseCartridge762x51mm
  name: cartridge (7.62x51mm FMJ)
  suffix: Need balance test #Lua
  parent: [ BaseCartridge, BaseC1Contraband ] # Frontier: BaseSecurityContraband<BaseC1Contraband
  description: A decently sized full-power round.
  abstract: true
  components:
  - type: Tag
    tags:
    - Cartridge
    - Cartridge762x51mmFMJ
  - type: CartridgeAmmo
    deleteOnSpawn: true
    proto: Bullet762x51mmFMJ
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Casings/ammo_casing.rsi
    layers:
    - state: base
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: StaticPrice
    price: 1

