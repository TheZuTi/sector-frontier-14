# Damage-per-second = 125 for pistols; 125-25 = 100 for caustic ammo; max COO = 5
# Main damage type - Blunt for standart; main damage/special damage = 70/30 for special
# LeptonComm status clear
# Standart
- type: entity
  id: Bullet45_ACPFMJ
  name: bullet (.45 ACP FMJ)
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Blunt: 25

