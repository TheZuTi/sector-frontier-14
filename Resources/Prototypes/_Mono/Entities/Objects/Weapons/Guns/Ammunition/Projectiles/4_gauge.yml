  - type: Projectile
    damage:
      types:
        Slash: 14

- type: entity
  id: Pellet23x75mmBuckshotSpread
  categories: [ HideSpawnMenu ]
  parent: Pellet23x75mmBuckshot
  components:
  - type: ProjectileSpread
    proto: Pellet23x75mmBuckshot
    count: 5 #Lua -1
    spread: 15

