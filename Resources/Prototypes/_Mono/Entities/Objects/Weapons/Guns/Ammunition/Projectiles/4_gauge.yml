# Damage-per-second = 175 for shotguns; 175-25 = 150 for caustic ammo; max COO = 2.5
# Damage-per-second = 150 for slug because slug has no spread (analogy with rifles)
# Main damage type - Slash for standart; main damage/blunt/piercing = 50/25/25 for HP; main damage/special damage = 70/30 for special
# LeptonComm status clear
# Standart
- type: entity
  id: Pellet23x75mmSlug
  name: pellet (4 gauge slug)
  categories: [ HideSpawnMenu ]
  parent: BaseBullet
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    state: slug
  - type: Projectile
    damage:
      types:
        Slash: 60

- type: entity
  id: Pellet23x75mmBuckshot
  name: pellet (4 gauge)
  categories: [ HideSpawnMenu ]
  parent: BaseBullet
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
