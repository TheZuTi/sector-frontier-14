# Damage-per-second = 75 for AP pistols; 75-25 = 50 for caustic ammo; max COO = 3
# Main damage type - Blunt for standart; main damage/special damage = 70/30 for special
# LeptonComm status clear
# Standart
- type: entity
  id: Bullet45_magnumFMJ
  name: bullet (.45 magnum)
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Blunt: 25
    ignoreResistances: true

