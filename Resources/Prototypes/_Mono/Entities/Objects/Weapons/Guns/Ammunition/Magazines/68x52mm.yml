# Base
- type: entity
  id: BaseMagazine68x52mmCaseless
  name: "magazine (6.8x52mm STANAG Caseless)"
  suffix: Need balance test #Lua
  parent: [ BaseCartridge, RecyclableItemSteelTiny ]
  abstract: true
  components:
  - type: Tag
    tags:
      - Magazine68x52mmCaseless
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - Cartridge68x52mmCaseless
    proto: Cartridge68x52mmCaseless
    capacity: 30
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Ammunition/Magazine/6.35x40mm_caseless/6.35x40mm_caseless_rifle_mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance

- type: entity
  id: BaseMagazine68x52mmCaselessShort
  name: "caseless rifle short magazine (6.8x52mm STANAG Caseless)"
  parent: BaseMagazine68x52mmCaseless
  abstract: true
  components:
  - type: BallisticAmmoProvider
    proto: Cartridge68x52mmCaseless
    capacity: 10
  - type: Item
    size: Tiny
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Ammunition/Magazine/6.35x40mm_caseless/6.35x40mm_caseless_rifle_mag_short.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]

