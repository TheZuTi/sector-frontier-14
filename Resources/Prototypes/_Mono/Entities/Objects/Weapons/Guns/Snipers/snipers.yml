- type: entity
  id: WeaponRifleAK410
  name: NCI AK-410 (7.62x54mmR)
  parent: [ BaseWeaponRifle, BaseC1Contraband ]
  description: "Bullpup DMR feeding from 762x54mmR magazines, developed to modernize USSP long-range infantry weapons."
  suffix: Need balance test #Lua
  components:
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Snipers/ak410.rsi
    layers:
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
    - state: base
      map: ["enum.GunVisualLayers.Base"]
  - type: Item # Mono
    shape: #Lua
    - 0,0,3,2
    size: Huge
    sprite: _Mono/Objects/Weapons/Guns/Snipers/ak410_inhands_32x.rsi
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/Snipers/ak410_inhands_32x.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
#  - type: GunWieldBonus # comment from _Lua
#    minAngle: -27
#    maxAngle: -36
  - type: Gun
    examineCaliber: gun-examine-caliber-76254 #Lua
#    minAngle: 27 # comment from _Lua
#    maxAngle: 39
    minAngle: 1.4 #Lua
    maxAngle: 7 #Lua
    angleIncrease: 5.6 #Lua
    angleDecay: 3.7 #Lua
    fireRate: 3
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/rifle2.ogg
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/ltrifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine762x54mmRFMJ
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
          - Magazine762x54mmRFMJ
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge762x54mmRFMJ
        priority: 1
        whitelist:
          tags:
          - Cartridge762x54mmRFMJ
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: ItemToggle #Lua
    onUse: false
    onActivate: false
    soundActivate:
      path: /Audio/_Lua/Weapons/mantison.wav
      params:
        volume: 3
    soundDeactivate:
      path: /Audio/_Lua/Weapons/mantisoff.wav
      params:
        volume: 3
  - type: ToggleClothing #Lua
    action: ActionToggleScope
    mustEquip: false
  - type: ComponentToggler #Lua
    components:
    - type: ClothingSpeedModifier #Lua
      walkModifier: 0.8
      sprintModifier: 0.8
    - type: CursorOffsetRequiresWield
    - type: EyeCursorOffset
      maxOffset: 7.5
      pvsIncrease: 1
  - type: SpeedModifiedOnWield # Mono
    walkModifier: 0.80 #Lua 0.85 -> 0.80
    sprintModifier: 0.80 #Lua 0.85 -> 0.80
  - type: PirateBountyItem # Mono
    id: StandardFactionLongarm
