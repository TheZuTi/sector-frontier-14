- type: entity
  name: VFD MR-8B LWMMG (8x65mm SKR)
  parent: [BaseWeaponLightMachineGun, BaseGunWieldable, BaseC3CentCommContraband] # Lua-changes: BaseC2ContrabandUnredeemable > BaseC3CentCommContraband
  id: WeaponLMGMR8B
  description: The LWMMG variant of the MR-8 series. Chambered in 8x65mm SKR, and accepts both box and STANAG magazines. A label on the side reads "FOR MILITARY USE ONLY".
  suffix: Need balance test #Lua
  components:
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/LMGs/mr8b.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
#  - type: GunWieldBonus # comment (82-84; 86-89) from _Lua
#    minAngle: -20
#    maxAngle: -20
  - type: Item #Lua
    shape:
    - 0,0,7,4
  - type: Gun
    examineCaliber: gun-examine-caliber-865 #Lua
#    minAngle: 24
#    maxAngle: 36
#    angleIncrease: 1.5 #Lua 3 -> 1.5
#    angleDecay: 34
    minAngle: 3 #Lua
    maxAngle: 15 #Lua
    angleIncrease: 1.3 #Lua
    angleDecay: 4.7 #Lua
    fireRate: 7 # Lua 6.2<7
    selectedMode: FullAuto
    availableModes:
    - SemiAuto
    - FullAuto
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/heavy_rifle_1.ogg
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/batrifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine8x65mmSKRBox #Lua
        insertSound: /Audio/Weapons/Guns/MagIn/sfrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/hpistol_magout.ogg
        priority: 2
        whitelist:
          tags:
          - Magazine762x39mmFMJ #Lua
          - MagazineBox8x65mmSKR #Lua
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge8x65mmSKR #Lua
        priority: 1
        whitelist:
          tags:
          - Cartridge762x39mmFMJ #Lua
          - Cartridge8x65mmSKR #Lua
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/LMGs/mr8b.rsi
  - type: StaticPrice
    price: 2500
  - type: HeldSpeedModifier #Lua
  - type: ClothingSpeedModifier #Lua
    sprintModifier: 0.85
    walkModifier: 0.85
  - type: SpeedModifiedOnWield
    walkModifier: 0.7 #Lua 0.85<0.7
    sprintModifier: 0.7 #Lua 0.65<0.7
  - type: GunRequiresWield
  - type: PirateBountyItem # Mono
    id: ExperimentalFactionWeapon

