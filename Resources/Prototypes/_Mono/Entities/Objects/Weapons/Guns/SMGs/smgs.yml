#    angleIncrease: 5 # comment from _Lua
#    angleDecay: 20
    minAngle: 3.1 #Lua
    maxAngle: 15.5 #Lua
    angleIncrease: 0.7 #Lua
    angleDecay: 5 #Lua
    fireRate: 10 #Lua 9.5<10
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/mla_fire.ogg
