- type: entity
  abstract: true
  id: EnergyShieldClothing
  components:
  - type: ShieldToggle
    soundActivate:
      path: /Audio/Weapons/ebladeon.ogg
    soundDeactivate:
      path: /Audio/Weapons/ebladeoff.ogg
    soundFailToActivate:
      path: /Audio/Machines/button.ogg
      params:
        variation: 0.250
    activeSound:
      path: /Audio/Weapons/ebladehum.ogg
  - type: PointLight
    enabled: false
    radius: 1.4
    energy: 2
    color: "#3ACCFF"
  - type: LightBehaviour
    behaviours:
    - !type:FadeBehaviour
      id: radiating
      interpolate: Linear
      maxDuration: 2.0
      startValue: 3.0
      endValue: 2.0
      isLooped: true
      reverseWhenFinished: true
    - !type:PulseBehaviour
      id: blinking
      interpolate: Nearest
      maxDuration: 1.0
      startValue: 0.1
      endValue: 2.0
      isLooped: true
  - type: Blocking
    passiveBlockModifier:
      coefficients:
        Blunt: 0.25
        Slash: 0.25
        Piercing: 0.25
        Heat: 0.25
    activeBlockModifier:
      coefficients:
        Blunt: 0.5
        Slash: 0.5
        Piercing: 0.5
        Heat: 0.5
      flatReductions:
        Heat: 5
        Piercing: 15
    passiveBlockFraction: 0.25
    activeBlockFraction: 0.5
    isClothing: true
  - type: Damageable
    damageContainer: Shield
  - type: Battery
    maxCharge: 40
    startingCharge: 40
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 5
  - type: RechargeableBlocking
