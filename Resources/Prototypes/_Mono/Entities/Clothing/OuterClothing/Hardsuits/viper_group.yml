- type: entity
  parent: [ClothingOuterHardsuitBase, BaseC3PirateContrabandPremium] # Lua-changes: BaseC3SyndicateContraband > BaseC3PirateContrabandPremium
  id: ClothingOuterHardsuitViperGroupStandard
  name: JACKAL mk.II viper hardsuit
  description: A hardsuit adorned with signature markings of the Viper Group. The armor is remarkably nimble for the protection it offers.
  suffix: Pirate, Medium, Special #Lua
  components:
  - type: Sprite
    sprite: _Lua/Clothing/OuterClothing/SCHardsuits/medium_special.rsi
  - type: Item
    size: Huge
  - type: Clothing
    sprite: _Lua/Clothing/OuterClothing/SCHardsuits/medium_special.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.05
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.5
  - type: Armor
    modifiers:
      coefficients:
        #Mechanical 40/40/40//60/60//60/60//50/10
        Blunt: 0.6
        Slash: 0.6 #Lua 0.55<0.6
        Piercing: 0.6 #Lua 0.45<0.6
        #Physical
        Heat: 0.4
        Radiation: 0.4
        #Special
        Shock: 0.4 #Lua
        Caustic: 0.4 #Lua 0.45<0.4
  - type: StaminaResistance # Mono - Stamres
    damageCoefficient: 0.5 #Lua 0.4<0.5
  - type: ClothingSpeedModifier
    walkModifier: 0.9 #Lua 0.95<0.9
    sprintModifier: 0.9 #Lua 0.95<0.9
  - type: HeldSpeedModifier
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuitViperGroupStandard
  - type: StaticPrice
    price: 1500
    vendPrice: 4000
