#region WizDen
- type: entity
  id: NFWeaponSubMachineGunAtreides
  parent: [ NFBaseWeaponSubMachineGunChamber9x19, NFBaseWeaponFrameSubMachineGunGorlex ] #Lua 35 -> 9x19 base
  name: Atreides
  description: |-
    Pla-ket-ket-ket-ket! An illegal firearm often used by Syndicate agents.
  components:
  - type: Gun
    fireRate: 5.5 #_Lua
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/atreides.ogg
  - type: Sprite
    sprite: _NF/Objects/Weapons/Guns/SMGs/atreides.rsi
  - type: Clothing
    sprite: _NF/Objects/Weapons/Guns/SMGs/atreides.rsi

- type: entity
  id: NFWeaponSubMachineGunC20r
  parent: [ NFBaseWeaponSubMachineGunChamber9x19, NFBaseWeaponFrameSubMachineGunCybersun ] #Lua 35 -> 9x19 base
  name: C-20r
  description: |-
    An illegal firearm that is often used by the infamous nuclear operatives.
  suffix: Need balance test
  components:
  - type: Item #Lua
    shape:
    - 0,0,2,1
  - type: Gun
    examineCaliber: gun-examine-caliber-45acp #Lua
    minAngle: 3.1 #Lua
    maxAngle: 15.5 #Lua
    angleIncrease: 0.7 #Lua
    angleDecay: 5 #Lua
    fireRate: 4 #Lua
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/c-20r.ogg
  - type: Sprite
    sprite: Objects/Weapons/Guns/SMGs/c20r.rsi
  - type: Clothing
    sprite: Objects/Weapons/Guns/SMGs/c20r.rsi
  - type: ChamberMagazineAmmoProvider
    autoEject: false #Lua true<false
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: true
  - type: ItemSlots #Lua
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine45_ACPSubMachineGunFMJ #Lua Magazine9x19mmSubMachineGunFMJ<Magazine45_ACPSubMachineGunFMJ
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist: &mag35Whitelist
          tags:
            - Magazine45_ACPSubMachineGunFMJ #Lua Magazine9x19mmSubMachineGunFMJ<Magazine45_ACPSubMachineGunFMJ
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber: &chamber35Standard
        name: Chamber
        startingItem: Cartridge45_ACPFMJ #Lua Cartridge9x19mmFMJ<Cartridge45_ACPFMJ
        priority: 1
        whitelist:
          tags:
            - Cartridge45_ACPFMJ #Lua Cartridge9x19mmFMJ<Cartridge45_ACPFMJ

- type: entity
  id: NFWeaponSubMachineGunDrozd
  parent: [ NFBaseWeaponSubMachineGunChamber9x19, NFBaseWeaponFrameSubMachineGunNanotrasen ] #Lua 35 -> 9x19 base
  name: Drozd
  description: A fully automatic SMG.
  suffix: Need balance test
  components: &drozdComponents
  - type: Item #Lua
    shape:
    - 0,0,2,1
  - type: Gun
    examineCaliber: gun-examine-caliber-919 #Lua
    minAngle: 3.1 #Lua
    maxAngle: 15.5 #Lua
    angleIncrease: 0.7 #Lua
    angleDecay: 5 #Lua
    fireRate: 4.5 #Lua 5.5<4.5
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/atreides.ogg
  - type: Sprite
    sprite: _NF/Objects/Weapons/Guns/SMGs/drozd.rsi
  - type: Clothing
    sprite: _NF/Objects/Weapons/Guns/SMGs/drozd.rsi

- type: entity
  id: NFWeaponSubMachineGunDrozdLessLethal # Frontier-specific rubber variant
  parent: [ NFBaseWeaponSubMachineGunChamber9x19Rubber, NFBaseWeaponFrameSubMachineGunNanotrasen ] #Lua 35 -> 9x19 base
  name: Drozd
  description: A fully automatic SMG.
  suffix: Frontier, Less-Lethal
  components: *drozdComponents

- type: entity
  id: NFWeaponSubMachineGunWt550
  parent: [ BaseC2ContrabandUnredeemable, NFBaseWeaponSubMachineGunChamber35TopMounted, NFBaseWeaponFrameSubMachineGunNanotrasen ]
  name: WT-550
  description: |-
    An excellent SMG. On the receiver is a label that says 'for authorized use only.'
  suffix: Need balance test
  components:
  - type: Item #Lua
    shape:
    - 0,0,2,1
  - type: Gun
    examineCaliber: gun-examine-caliber-919 #Lua
    minAngle: 3.1 #Lua
    maxAngle: 15.5 #Lua
    angleIncrease: 0.7 #Lua
    angleDecay: 5 #Lua
    fireRate: 6 #Lua
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/c-20r.ogg
  - type: Sprite
    sprite: _NF/Objects/Weapons/Guns/SMGs/wt550.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: base-unshaded
        map: ["enum.GunVisualLayers.BaseUnshaded"]
        shader: unshaded
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
      - state: mag-unshaded-0
        map: ["enum.GunVisualLayers.MagUnshaded"]
        shader: unshaded
  - type: Clothing
    sprite: _NF/Objects/Weapons/Guns/SMGs/wt550.rsi
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: true
  - type: ChamberMagazineAmmoProvider
    boltClosed: null

#region DeltaV
- type: entity
  id: NFWeaponSubMachineGunTypewriter
  parent: [ NFBaseWeaponSubMachineGunChamber9x19, NFBaseWeaponFrameSubMachineGunFrontierGunsmith ] #Lua 35 -> 9x19 base
  name: Typewriter
  description: |-
    A modern take on the classic design used by mobsters throughout space and time.
  components:
  - type: Gun
    soundGunshot:
      path: /Audio/_DV/Weapons/Guns/Gunshots/typewriter.ogg
  - type: Sprite
    sprite: _DV/Objects/Weapons/Guns/SMGs/typewriter.rsi
  - type: Clothing
    sprite: _DV/Objects/Weapons/Guns/SMGs/typewriter.rsi
