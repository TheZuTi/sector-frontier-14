#region WizDen
- type: entity # TODO: switch to .25 rifle (caseless)
  id: NFWeaponRifleAssaultSm
  parent: [ NFBaseWeaponRifleAssaultChamber762x39, NFBaseWeaponFrameRifleAssaultCybersunUnwieldable ] #Lua 30 -> 762x39
  name: Soland-Moss # Renamed: real brand name
  suffix: Need balance test
  description: |-
    An iconic weapon of war. An illegal firearm often used by Syndicate agents.
  components:
  - type: GunRequiresWield #Lua
  - type: Wieldable #Lua
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/Rifles/akm_inhands_32x.rsi # Mono
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Rifles/akm.rsi # Mono
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Item # Mono
    shape: #Lua
    - 0,0,3,2
    sprite: _Mono/Objects/Weapons/Guns/Rifles/akm_inhands_32x.rsi
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Gun
    examineCaliber: gun-examine-caliber-76239 #Lua
    minAngle: 1 #Lua
    maxAngle: 3.5 #Lua
    angleIncrease: 0.2 #Lua
    angleDecay: 1 #Lua
    fireRate: 5 #Lua

- type: entity # TODO: switch to .25 rifle (caseless)
  id: NFWeaponRifleAssaultM90GrenadeLauncher
  parent: [ NFBaseWeaponRifleAssaultChamber556x45, NFBaseWeaponFrameRifleAssaultCybersun ] #Lua 20 -> 556x45
  name: M-90gl
  description: |-
    An older bullpup carbine model, with an attached underbarrel grenade launcher. An illegal firearm often used by Syndicate agents.
  suffix: Need balance test
  components:
  - type: Clothing
    sprite: Objects/Weapons/Guns/Rifles/carbine.rsi
  - type: Sprite
    sprite: Objects/Weapons/Guns/Rifles/carbine.rsi
  - type: Item #Lua
    shape:
    - 0,0,3,2
  - type: Gun #Lua
    minAngle: 1 #Lua
    maxAngle: 3.5 #Lua
    angleIncrease: 0.2 #Lua
    angleDecay: 1 #Lua
    fireRate: 8.4
  - type: HeldSpeedModifier #Lua
    walkModifier: 0.7
    sprintModifier: 0.7
  - type: ItemSlots #Lua
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine762x51mmFMJ
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist: &mag20Whitelist
          tags:
            - Magazine762x51mmFMJ
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber: &chamber20Standard
        name: Chamber
        startingItem: Cartridge762x51mmFMJ
        priority: 1
        whitelist:
          tags:
            - Cartridge762x51mmFMJ

- type: entity
  id: NFWeaponRifleAssaultLecter
  parent: [ BaseC2ExpeditionContraband, NFBaseWeaponRifleAssaultChamber556x45, NFBaseWeaponFrameRifleAssaultNanotrasen ] #Lua 20 -> 556x45
  name: Lecter
  description: |-
    A medium end military grade assault rifle. On the receiver is a label that says 'for authorized use only.'
  suffix: Need balance test
  components: &lecterComponents
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/Rifles/lecter_inhands_32x.rsi
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Rifles/lecter.rsi
  - type: Item # Mono
    shape: #Lua
    - 0,0,3,2
    sprite: _Mono/Objects/Weapons/Guns/Rifles/lecter_inhands_32x.rsi
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Gun
    examineCaliber: gun-examine-caliber-76239 #Lua
    minAngle: 1 #Lua
    maxAngle: 3.5 #Lua
    angleIncrease: 0.2 #Lua
    angleDecay: 1 #Lua
    fireRate: 6 #Lua
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/ltrifle.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine762x39mmFMJ #Lua Magazine556x45mmFMJ<Magazine762x39mmFMJ
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist: # &mag20Whitelist #comment from _Lua
          tags:
            - Magazine762x39mmFMJ #Lua Magazine556x45mmFMJ<Magazine762x39mmFMJ
#            - NFMagazineDrumRifle556x45 #comment from _Lua
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber: # &chamber20Standard #comment from _Lua
        name: Chamber
        startingItem: Cartridge762x39mmFMJ #Lua Cartridge556x45mmFMJ<Cartridge762x39mmFMJ
        priority: 1
        whitelist:
          tags:
            - Cartridge762x39mmFMJ #Lua Cartridge556x45mmFMJ<Cartridge762x39mmFMJ

