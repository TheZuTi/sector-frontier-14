
#region WizDen
- type: entity
  id: NFWeaponLightMachineGunL6
  parent: [ NFBaseWeaponLightMachineGunChamber556x45, NFBaseWeaponFrameLightMachineGunGorlex ] #Lua 20 -> 556x45
  name: GSW LMG-6
  description: |-
    A rather traditionally made LMG with a pleasantly lacquered wooden pistol grip. An illegal firearm often used by Syndicate agents.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/LMGs/l6.rsi
  - type: Clothing
    sprite: Objects/Weapons/Guns/LMGs/l6.rsi
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: true
  - type: Gun #Lua
    fireRate: 8.4
  - type: ItemSlots #Lua
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine68x52mmCaselessBig
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - Magazine68x52mmCaseless
      gun_chamber:
        name: Chamber
        startingItem: Cartridge68x52mmCaseless
        priority: 1
        whitelist:
          tags:
            - Cartridge68x52mmCaseless
  - type: HeldSpeedModifier #Lua
  - type: ClothingSpeedModifier #Lua
    sprintModifier: 0.85
    walkModifier: 0.85
  - type: SpeedModifiedOnWield #Lua
    walkModifier: 0.85
    sprintModifier: 0.85

- type: entity
  id: NFWeaponLightMachineGunL6C
  parent: [ NFBaseWeaponFrameLightMachineGunGorlex ]
  name: cyborg GSW LMG-6
  description: |-
    A GSW LMG-6 for use by cyborgs. Creates rifle ammo on the fly from an internal ammo fabricator, which slowly self-charges. An illegal firearm often used by Syndicate agents.
  components:
  - type: Gun
    examineCaliber: gun-examine-caliber-20
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/lmg.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/lmg_empty.ogg
  - type: Sprite
    sprite: Objects/Weapons/Guns/LMGs/l6.rsi
  - type: Clothing
    sprite: Objects/Weapons/Guns/LMGs/l6.rsi
  - type: ProjectileBatteryAmmoProvider
    proto: Cartridge556x45mmFMJ #Lua 20 -> 556x45
    fireCost: 100
  - type: Battery
    maxCharge: 10000
    startingCharge: 10000
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 25
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: true
