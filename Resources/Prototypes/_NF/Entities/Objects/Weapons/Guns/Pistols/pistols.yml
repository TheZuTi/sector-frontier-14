#region WizDen
- type: entity
  id: NFWeaponPistolMk58
  parent: [ BaseC1Contraband, NFBaseWeaponPistolChamber9x19, NFBaseWeaponFramePistolNanotrasen ] #Lua 35 -> 9x19
  name: mk58
  description: A cheap semiauto sidearm.
  suffix: Need balance test
  components:
  - type: Gun #Lua
    examineCaliber: gun-examine-caliber-919 #Lua
    minAngle: 3.1 #Lua
    maxAngle: 15.5 #Lua
    angleIncrease: 0.7 #Lua
    angleDecay: 5 #Lua
    fireRate: 4.5
  - type: Sprite
    sprite: Objects/Weapons/Guns/Pistols/mk58.rsi
  - type: Clothing
    sprite: Objects/Weapons/Guns/Pistols/mk58.rsi
  - type: NFWeaponDetails
  - type: PirateBountyItem
    id: NFWeaponPistolMk58

- type: entity
  id: NFWeaponPistolN1984
  parent: [ BaseC1Contraband, NFBaseWeaponPistolChamber45ACP, NFBaseWeaponFramePistolNanotrasen ] #Lua 45 -> 45ACP
  name: N1984
  description: |-
    The sidearm of any self respecting officer. On the handle is a label that says 'for authorized use only.'
  suffix: Need balance test
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Pistols/N1984.rsi
  - type: Clothing
    sprite: Objects/Weapons/Guns/Pistols/N1984.rsi
  - type: Gun #Lua
    examineCaliber: gun-examine-caliber-45acp #Lua
    minAngle: 3.1 #Lua
    maxAngle: 15.5 #Lua
    angleIncrease: 0.7 #Lua
    angleDecay: 5 #Lua
    fireRate: 6

- type: entity
  id: NFWeaponPistolCobra
  parent: [ BaseC1Contraband, NFBaseWeaponPistolChamber45ACP, NFBaseWeaponFramePistolCybersun ] #Lua 45 -> 45ACP
  name: cobra
  description: |-
    A rugged, robust operator handgun with inbuilt silencer. An illegal firearm often used by Syndicate agents.
  suffix: Need balance test
  components:
  - type: Gun
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/silenced.ogg
      params:
        volume: -5
  - type: Sprite
    sprite: _NF/Objects/Weapons/Guns/Pistols/cobra.rsi
  - type: Clothing
    sprite: _NF/Objects/Weapons/Guns/Pistols/cobra.rsi

