#region Frontier
- type: entity
  id: NFWeaponRevolverArgenti
  parent: [ NFBaseWeaponRevolverChamber45Magnum, NFBaseWeaponFrameRevolverFrontierGunsmith ] #Lua BaseWeaponRevolver<NFBaseWeaponRevolverChamber45Magnum
  name: argenti
  description: |-
    The civilian grade Argenti Type 35 revolver. Manufactured by Silver Industries. While the design with expanded cylinder is quite ancient, the right gunslinger will know how to utilise it well.
  suffix: Need balance test
  components:
  - type: Sprite
    scale: 0.75, 0.75
    sprite: _NF/Objects/Weapons/Guns/Revolvers/argenti.rsi
  - type: Clothing
    sprite: _NF/Objects/Weapons/Guns/Revolvers/argenti.rsi
  - type: Gun
    examineCaliber: gun-examine-caliber-45acp #Lua
    minAngle: 3.1 #Lua
    maxAngle: 15.5 #Lua
    angleIncrease: 0.7 #Lua
    angleDecay: 5 #Lua
    fireRate: 3 #Lua 2.5<3
    resetOnHandSelected: false
  - type: RevolverAmmoProvider
    whitelist:
      tags:
        - Cartridge45_ACPFMJ #Lua Cartridge9x19mmFMJ<Cartridge45_ACPFMJ
#        - SpeedLoader9x19mmFMJ # comment from _Lua
    proto: Cartridge45_ACPFMJ #Lua Cartridge9x19mmFMJ<Cartridge45_ACPFMJ
    capacity: 8
    chambers: [ True, True, True, True, True, True, True, True ]
    ammoSlots: [ null, null, null, null, null, null, null, null ]
  - type: StaticPrice
    price: 200

# Frontier: Rubber
- type: entity
  id: NFWeaponRevolverArgentiLessLethal
  parent: NFWeaponRevolverArgenti
  suffix: Frontier, Less-lethal
  components:
  - type: RevolverAmmoProvider
    proto: Cartridge9x19mmRubber #Lua 35 -> 9x19
