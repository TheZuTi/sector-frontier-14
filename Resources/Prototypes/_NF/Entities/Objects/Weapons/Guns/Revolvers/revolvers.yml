#region WizDen
- type: entity
  id: NFWeaponRevolverInspector
  parent: [ BaseC1Contraband, NFBaseWeaponRevolverChamber45Magnum, NFBaseWeaponFrameRevolverNanotrasen ] #Lua 45 -> magnum
  name: inspector
  description: |-
    A detective's best friend. On the handle is a label that says 'for authorized use only.'
  suffix: Need balance test
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Revolvers/inspector.rsi
  - type: Clothing
    sprite: Objects/Weapons/Guns/Revolvers/inspector.rsi
  - type: Gun #Lua
    minAngle: 1 #Lua
    maxAngle: 3.5 #Lua
    angleIncrease: 0.2 #Lua
    angleDecay: 1 #Lua
    fireRate: 1.9 #Lua

- type: entity
  id: NFWeaponRevolverWard45
  parent: [ BaseC1Contraband, NFBaseWeaponRevolverChamber45Magnum, NFBaseWeaponFrameRevolverNanotrasen ] #Lua 45 -> magnum
  name: ward-45
  description: |-
    The iconic sidearm of the dreaded death squads. On the handle is a label that says 'for authorized use only.'
  suffix: Need balance test
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Revolvers/mateba.rsi
  - type: Clothing
    sprite: Objects/Weapons/Guns/Revolvers/mateba.rsi
  - type: Gun
    minAngle: 1 #Lua
    maxAngle: 3.5 #Lua
    angleIncrease: 0.2 #Lua
    angleDecay: 1 #Lua
    fireRate: 1.9 #Lua
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/mateba.ogg

- type: entity
  id: NFWeaponRevolverDeckard
  parent: [ NFBaseWeaponRevolverChamber45Magnum, NFBaseWeaponFrameRevolverFrontierGunsmith ] #Lua 45 -> magnum
  name: deckard
  description: |-
    A rare, civilian grade custom-built revolver. Use when there is no time for Voight-Kampff test.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Revolvers/deckard.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-unshaded-3
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Clothing
    sprite: Objects/Weapons/Guns/Revolvers/deckard.rsi
  - type: RevolverAmmoProvider
    capacity: 5
    chambers: [ True, True, True, True, True ]
    ammoSlots: [ null, null, null, null, null ]
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: true
  - type: Gun #Lua
    fireRate: 1.6 #Lua

- type: entity
  id: NFWeaponRevolverRitland45
  parent: [ NFBaseWeaponRevolverChamber45Magnum, NFBaseWeaponFrameRevolverGorlex ] #Lua 45 -> magnum
  name: ritland-45
  description: |-
    An illegal revolver favoured by Syndicate agents.
  suffix: Need balance test
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Revolvers/python.rsi
  - type: Clothing
    sprite: Objects/Weapons/Guns/Revolvers/python.rsi
  - type: Gun #Lua
    fireRate: 1.6 #Lua
    minAngle: 1 #Lua
    maxAngle: 3.5 #Lua
    angleIncrease: 0.2 #Lua
    angleDecay: 1 #Lua

- type: entity
  id: NFWeaponRevolverPirate
  parent: [ NFBaseWeaponRevolverChamber45Magnum, NFBaseWeaponFrameRevolverSteelbolt ] #Lua 45 -> magnum
  name: pirate revolver
  description: |-
    An odd, illegal, old-looking revolver, favoured by pirate crews.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Revolvers/pirate_revolver.rsi
  - type: Clothing
    sprite: Objects/Weapons/Guns/Revolvers/pirate_revolver.rsi

- type: entity
  id: NFWeaponPistolFlintlock
  parent: [ NFBaseWeaponRevolverChamber50, NFBaseWeaponFrameRevolverSteelbolt ]
  name: flintlock pistol
  description: |-
    A pirate's companion. Yarrr! An illegal weapon often used by pirates.
  components:
  - type: Sprite
    sprite: _NF/Objects/Weapons/Guns/Revolvers/flintlock.rsi
  - type: Clothing
    sprite: _NF/Objects/Weapons/Guns/Revolvers/flintlock.rsi
  - type: UseDelay
    delay: 5

# WizDen: Rubber
