#region Pulse
# WizDen
- type: entity
  id: NFWeaponEnergyRifleAssaultPulseCarbine
  parent: [BaseC3CentCommContraband, NFBaseWeaponEnergyRifleAssaultHitScanPulse, NFBaseWeaponFrameEnergyRifleAssaultNanotrasen] # Lua-changes: BaseC2Contraband > BaseC3CentCommContraband
  name: pulse carbine
  description: |-
    A high tech energy carbine favoured by the NT-ERT operatives. On the handle is a label that says 'for authorized use only.'
  suffix: Need balance test
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Battery/pulse_carbine.rsi
  - type: Clothing
    sprite: Objects/Weapons/Guns/Battery/pulse_carbine.rsi
  - type: Battery # 30 shots
    maxCharge: 750 #Lua edit: From 3200 to 750
    startingCharge: 750 #Lua edit: From 3200 to 750
  - type: Gun # Lua
    minAngle: 1 #Lua
    maxAngle: 3.5 #Lua
    angleIncrease: 0.2 #Lua
    angleDecay: 1 #Lua
    fireRate: 7
  - type: HitscanBatteryAmmoProvider
    proto: LuaPulseRifleLow
    fireCost: 25
  - type: BatterySelfRecharger #Lua
    autoRecharge: true
    autoRechargeRate: 30

- type: entity #Lua
  parent: BasicHitscan
  categories: [ HideSpawnMenu ]
  id: LuaPulseRifleLow
  components:
  - type: HitscanBasicDamage
    damage:
      types:
        Heat: 15
        Radiation: 10
  - type: HitscanBasicVisuals
    muzzleFlash:
      sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
      state: muzzle_blue
    travelFlash:
      sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
      state: beam_blue
    impactFlash:
      sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
      state: impact_blue

#region Laser
# Frontier
- type: entity
  id: NFWeaponEnergyLightMachineGunTurbo
  parent: [ BaseC3ContrabandUnredeemable, NFBaseWeaponEnergyRifleAssaultFireModes, NFBaseWeaponFrameEnergyRifleAssaultCybersun ]
  name: turbo laser mk3
  description: |-
    A turbo laser ripped from the guardian unit. Appears to be a rather old model. Doesn't seem to be working properly. Supposedly highly illegal.
  suffix: Need balance test
  components:
  - type: Gun
    soundGunshot:
      path: /Audio/_DV/Weapons/Guns/Gunshots/laser.ogg
    minAngle: 3 #Lua
    maxAngle: 15 #Lua
    angleIncrease: 1.3 #Lua
    angleDecay: 4.7 #Lua
    fireRate: 3.6
  - type: ClothingSpeedModifier
    walkModifier: 0.7
    sprintModifier: 0.7
  - type: HeldSpeedModifier
  - type: Item
    shape: #Lua
    - 0,0,4,3
    size: Ginormous
    inhandVisuals:
      left:
      - state: inhand-left
      - state: inhand-left-unshaded
        shader: unshaded
      right:
      - state: inhand-right
      - state: inhand-right-unshaded
        shader: unshaded
  - type: Sprite
    sprite: _NF/Objects/Weapons/Guns/Battery/turbo_laser.rsi
    layers:
    - state: icon-base
    - state: charge-level-unshaded-5
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Clothing
    quickEquip: false
    slots:
    - Back
    - suitStorage
    sprite: _NF/Objects/Weapons/Guns/Battery/turbo_laser.rsi
    clothingVisuals:
      back:
      - state: equipped-back
      - state: equipped-unshaded
        shader: unshaded
      suitstorage:
      - state: equipped-back
      - state: equipped-unshaded
        shader: unshaded
  - type: Battery # 50 shots
    maxCharge: 4000
    startingCharge: 4000
  - type: MagazineVisuals
    magState: charge-level
    steps: 6
    zeroVisible: true
  - type: BatteryWeaponFireModes
    fireModes:
    - proto: LuaBulletLaserHigh
      fireCost: 40 #Lua 80<40

- type: entity #Lua
  id: LuaBulletLaserHigh
  parent: NFBaseBulletLaser
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    impactEffect: BulletImpactEffectOrangeDisabler
    damage:
      types:
        Shock: 17.5
        Caustic: 7.5
