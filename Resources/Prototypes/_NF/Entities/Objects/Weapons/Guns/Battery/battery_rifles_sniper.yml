
# WizDen
#region Laser
- type: entity
  id: NFWeaponEnergyRifleSniperCannon
  parent: [ BaseC2ContrabandUnredeemable, NFBaseWeaponEnergyRifleSniperHitScan, NFBaseWeaponFrameEnergyRifleSniperNanotrasen ]
  name: laser cannon
  suffix: Frontier
  description: |-
    A heavy duty, high powered laser sniper rifle. On the handle is a label that says 'for authorized use only.'
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Battery/laser_cannon.rsi
  - type: Clothing
    sprite: Objects/Weapons/Guns/Battery/laser_cannon.rsi

#Lua: Changed firerate, added scope
  - type: Gun
    fireRate: 1.5
  - type: ItemToggle
    onUse: false
    onActivate: true
  - type: ComponentToggler
    components:
    - type: CursorOffsetRequiresWield
    - type: EyeCursorOffset
      maxOffset: 10
      pvsIncrease: 0.7
#end Lua
- type: entity
  id: NFWeaponEnergyRifleSniperXrayCannon
  parent: [ BaseC3Contraband, NFBaseWeaponEnergyRifleSniperHitScanXray, NFBaseWeaponFrameEnergyRifleSniperNanotrasen ]
  name: x-ray cannon
  suffix: Frontier
  description: |-
    An illegal and experimental weapon that uses concentrated x-ray energy against its target.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Battery/xray.rsi
  - type: Clothing
    sprite: Objects/Weapons/Guns/Battery/xray.rsi
#Lua: Changed sound of gunshot, added scope
  - type: Gun
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser3.ogg
    fireRate: 2
  - type: ItemToggle
    onUse: false
    onActivate: true
  - type: ComponentToggler
    components:
    - type: CursorOffsetRequiresWield
    - type: EyeCursorOffset
      maxOffset: 10
      pvsIncrease: 0.7
#end Lua
