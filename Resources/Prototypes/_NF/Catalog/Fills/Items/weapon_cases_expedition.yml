# Special gun cases that will randomize the stats of their spawned weapon
- type: entity
  id: RareWeaponCase
  abstract: true
  components:
  - type: RareWeaponSpawnerCase
    randomRarity: true

# Gun cases with contraband (unregistered) guns for expeditions
#region Pistols
- type: entity
  parent: [WeaponCaseShort] #Lua
  id: WeaponCaseShortMk58Expedition
  suffix: Dungeon, Mk58
  categories: [ HideSpawnMenu ]
