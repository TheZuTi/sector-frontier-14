- type: job
  id: SecurityGuard
  name: job-name-security-guard
  description: job-description-security-guard
  playTimeTracker: JobSecurityGuard
  requirements:
    - !type:OverallPlaytimeRequirement
      time: 18000 # Frontier - 5 hrs
    - !type:DepartmentTimeRequirement #Lua
      department: Frontier
      time: 18000
  startingGear: SecurityGuardGear
  alwaysUseSpawner: true
  icon: "JobIconSecurityGuard"
  supervisors: job-supervisors-sr
  weight: 80
  displayWeight: 70 # Second from the bottom
  canBeAntag: false
  access:
  - Security
  - Brig
  - Maintenance
  - Service
  - External
  - Mercenary
  - Captain
  - Frontier
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant, TrackingImplant ]
  - !type:GiveItemOnHolidaySpecial
    holiday: FrontierBirthday
    prototype: FrontierBirthdayGift
  - !type:AddComponentSpecial
    components:
      - type: Company
        companyName: Security

- type: startingGear
  id: SecurityGuardGear
  equipment:
    eyes: ClothingEyesGlassesSunglasses #ClothingEyesGlassesSecurity
#    pocket1: NFWeaponPistolUniversalNfsdLessLethal
    pocket2: Magazine9x19mmPistolFMJ #Lua 35 -> 9x19
  storage:
    back:
    - Flash
    - Magazine9x19mmPistolFMJ #Lua 35 -> 9x19
    - Magazine9x19mmPistolRubber #Lua 35 -> 9x19
    - ShipVoucherFrontierGuard
  encryptionKeys:
  - EncryptionKeyService
  - EncryptionKeySecurity


- type: chameleonOutfit
  id: SecurityGuardChameleonOutfit
  job: SecurityGuard
  hasMindShield: true
  equipment:
    head: ClothingHeadHatBeretSecurity
    mask: ClothingMaskGasSecurity
    gloves: ClothingHandsGlovesColorBlack
