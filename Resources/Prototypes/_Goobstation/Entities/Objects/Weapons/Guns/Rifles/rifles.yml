- type: entity
  name: TCA M27 Annie (7.62x39mm)
  parent: [BaseC3CentCommContraband, BaseWeaponRifle] # Mono - C2 contra # Lua-changes: BaseC2ContrabandUnredeemable > BaseC3CentCommContraband
  id: WeaponRifleAnnie
  description: A beast designed to shoulder the weight of impossible missions. Uses 7.62x39mm ammo.
  components:
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Rifles/annie.rsi # Mono
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Item # Mono
    shape: #Lua
    - 0,0,3,2
    sprite: _Mono/Objects/Weapons/Guns/Rifles/annie_inhands_32x.rsi
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/Rifles/annie_inhands_32x.rsi
  - type: Wieldable
    unwieldOnUse: false
  - type: GunRequiresWield
  - type: Gun
    examineCaliber: gun-examine-caliber-76239 #Lua
    availableModes:
    - FullAuto
#    - Burst #comment from _Lua
    burstFireRate: 12
    burstCooldown: 0.8
    shotsPerBurst: 4
    minAngle: 1 #Lua
    maxAngle: 3.5 #Lua
    angleIncrease: 0.2 #Lua
    angleDecay: 1 #Lua
    fireRate: 7 #Lua 6.5<7
    projectileSpeed: 42.5 # Mono
    soundGunshot:
      path: /Audio/_Goobstation/Weapons/Guns/Gunshots/thock.ogg
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/batrifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine762x39mmFMJ
        insertSound: /Audio/_Mono/Weapons/Guns/SmallArms/MagIn/amr_magin.ogg # Mono
        ejectSound: /Audio/_Mono/Weapons/Guns/SmallArms/MagOut/cm82_magout.ogg # Mono
        priority: 2
        whitelist:
          tags:
            - Magazine762x39mmFMJ
            - Magazine762x39mmFMJ
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge762x39mmFMJ
        priority: 1
        whitelist:
          tags:
            - Cartridge762x39mmFMJ
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: PirateBountyItem # Mono
    id: ExperimentalFactionWeapon

