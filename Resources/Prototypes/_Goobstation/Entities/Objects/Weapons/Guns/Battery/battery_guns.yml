- type: entity
  name: EG-4 energy revolver
  parent: [BaseC3CentCommContraband, BaseWeaponBatterySmall] # Mono - C2 contra instead of command contra # Lua-changes: BaseC1Contrband > BaseC3CentCommContraband
  id: WeaponEnergyRevolver
  description: A highly advanced energy revolver capable of firing both lethal and disabling bullets.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Weapons/Guns/Battery/erevolver.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mode-disabler
      shader: unshaded
      map: [ "Firemode" ]
    - state: mag-unshaded-4
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Clothing
    quickEquip: false
    slots:
    - Belt
    - suitStorage
    - Back
    sprite: _Goobstation/Objects/Weapons/Guns/Battery/erevolver.rsi
  - type: Gun
    minAngle: 3.1 #Lua
    maxAngle: 15.5 #Lua
    angleIncrease: 0.7 #Lua
    angleDecay: 5 #Lua
    fireRate: 3.8 #Lua 1.5<3.8
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser_cannon.ogg
    soundEmpty:
      path: /Audio/_DV/Weapons/Guns/Empty/dry_fire.ogg
  - type: Battery
    maxCharge: 250 #Lua 1800<1000
    startingCharge: 250 #Lua 1800<1000
  - type: ProjectileBatteryAmmoProvider
    proto: NFBulletDisabler
    fireCost: 25
  - type: EnergyGun
    fireModes:
    - proto: NFBulletDisabler
      fireCost: 25
      name: disable
      state: disabler
    - proto: BulletEnergyGunMagnum
      fireCost: 25 # Mono - 150 < 225
      name: lethal
      state: lethal
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: true
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.EnergyGunFireModeVisuals.State:
        Firemode:
          Disabler: { state: mode-disabler }
          Lethal: { state: mode-lethal }
  - type: Tag
    tags:
    - Sidearm
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 10 #Lua 10<35
