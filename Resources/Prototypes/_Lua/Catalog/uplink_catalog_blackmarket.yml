# Uplink console
- type: entity
  name: стационарный аплинк чёрного рынка
  parent: [BaseStructureDisableToolUse, ComputerUplinkBase, StorePresetBMUplink, BaseStructureIndestructible, BaseStructureComputer]
  id: LuaComputerUplinkBM
  description: Все самые запрещённые штучки теперь прямо перед вами!
  suffix: Need balance test
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _Lua/Structures/Machines/computers.rsi
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard_trade
    - map: ["computerLayerScreen"]
      state: transferPirateN
    - map: ["computerLayerKeys"]
      state: tech_key
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      state: generic_panel_open
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container
      board: !type:Container
  - type: Tag
    tags:
    - BMUplink
