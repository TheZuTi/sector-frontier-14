  components:
  - type: Store
    name: store-preset-name-erc-uplink
    categories:
    - UplinkERCHardsuits
    - UplinkERCWeapons
    - UplinkERCAmmo
    # - UplinkERCUtility
    # - UplinkERCExplosives
    - UplinkERCMedicine
    currencyWhitelist:
    - Speso
    useBankAccount: true

# Uplink console
- type: entity
  name: стационарный аплинк ЭИК
  parent: [BaseStructureDisableToolUse, ComputerUplinkBase, StorePresetERCUplink, BaseStructureIndestructible, BaseStructureComputer]
  id: LuaComputerUplinkERC
  description: Чтобы выжить в мире хищников, нужно иметь зубы.
  suffix: Need balance test
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _Lua/Structures/Machines/computers.rsi
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard_trade
    - map: ["computerLayerScreen"]
      state: transferERC
    - map: ["computerLayerKeys"]
      state: tech_key
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      state: generic_panel_open
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container
      board: !type:Container
  - type: Tag
    tags:
    - ERCUplink
