    - CharlieUplinkWeapon

- type: listing
  id: CharlieUplinkWeaponRifleM4SPRCustom
  name: модернизированная боевая винтовка M4SPR
  description: Улучшенная версия и без того отличной M4SPR. Способна использовать патроны A19, а также обладает лучшим контролем и точностью, но при этом сложнее в использовании. Может использовать традиционные магазины M4SPR, но с меньшим уроном.
  icon: { sprite: _RMC14/Objects/Weapons/Guns/Rifles/m4spr_custom.rsi, state: icon }
  productEntity: WeaponRifleM4SPRCustom
  cost:
    FrontierUplinkCoin: 5
  categories:
    - CharlieUplinkWeapon

- type: listing
  id: CharlieUplinkNFWeaponRifleAssaultM90GrenadeLauncher
  name: М-90gl
  description: Карабин старой модели, выполненный по схеме булл-пап, с подствольным гранатомётом. Использует патроны калибра 5.56x45mm.
  icon: { sprite: Objects/Weapons/Guns/Rifles/carbine.rsi, state: icon }
  productEntity: NFWeaponRifleAssaultM90GrenadeLauncher
