    - CharlieUplinkWeapon

- type: listing
  id: CharlieUplinkCMWeaponPistolMK80
  name: Пистолет MK80
  description: Массивный и грозный самозарядный пистолет под 9-мм Squash-Head. Часто встречается как у ЧВК We-Ya, так и у корп. управленцев; проходит ограниченные войсковые испытания у Морпехов.
