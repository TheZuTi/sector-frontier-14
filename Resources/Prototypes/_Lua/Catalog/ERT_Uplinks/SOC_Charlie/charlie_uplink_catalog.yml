- type: listing
  id: CharlieUplinkRMCWeaponPistolSU6
  name: Смарт-пистолет SU-6
  description: Экспериментальный пистолет с идентификацией «свой-чужой», проходит войсковые испытания в UNMC. Использует модифицированные .45 ACP IFF боеприпасы, способен стрелять очередями.
  icon: { sprite: _RMC14/Objects/Weapons/Guns/Pistols/su6.rsi, state: icon }
