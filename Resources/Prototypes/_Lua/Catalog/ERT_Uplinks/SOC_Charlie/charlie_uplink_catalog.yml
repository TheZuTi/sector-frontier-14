- type: listing
  id: CharlieUplinkWeaponRifleM16
  name: Винтовка М16
  description: Старая, надежная конструкция, впервые принятая на вооружение американской армией в 1960-х годах. Подобное оружие должно находиться в музее военной истории. 
  productEntity: WeaponRifleM16
  cost:
    FrontierUplinkCoin: 5
  categories:
    - CharlieUplinkWeapon

- type: listing
  id: CharlieUplinkWeaponRifleM4SPR
