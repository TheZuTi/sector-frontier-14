#region Вооружение 
- type: listing
  id: CharlieUplinkPulseCarbine
  name: Импульсный карабин
  description: Высокотехнологичный энергетический карабин, излюбленный бойцами ОБР NanoTrasen. На рукоятке имеется наклейка с надписью «Только для авторизованного использования».
  icon: { sprite: Objects/Weapons/Guns/Battery/pulse_carbine.rsi, state: icon }
  productEntity: NFWeaponEnergyRifleAssaultPulseCarbine
  cost:
    FrontierUplinkCoin: 5
  categories:
    - CharlieUplinkWeapon

- type: listing
  id: CharlieUplinkNFWeaponEnergyRiflePulse
  name: импульсная винтовка
  description: Оружие, почти столь же печально известное, как и его пользователи.
  icon: { sprite: Objects/Weapons/Guns/Battery/pulse_rifle.rsi, state: icon }
  productEntity: NFWeaponEnergyRiflePulse
  cost:
    FrontierUplinkCoin: 5
  categories:
    - CharlieUplinkWeapon

- type: listing
  id: CharlieUplinkNFWeaponEnergyPistolPulse
  name: импульсный пистолет
  description: Новейший энергетический пистолет, предпочитаемый Рейнджерами NanoTrasen в качестве запасного оружия.
  icon: { sprite: Objects/Weapons/Guns/Battery/pulse_pistol.rsi, state: icon }
