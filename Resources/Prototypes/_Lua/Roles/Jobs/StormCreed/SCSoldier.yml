- type: job
  id: StormCreedSoldier
  name: job-name-sc-soldier
  description: job-description-sc-soldier
  playTimeTracker: JobStormCreedSoldier
  requirements:
  - !type:RoleTimeRequirement
    role: JobSeniorOfficer
    time: 36000 # 20h
  startingGear: SCSoldierGear
  alwaysUseSpawner: true
  hideConsoleVisibility: true
  canBeAntag: true
  icon: "JobIconNFPirate"
  supervisors: job-supervisors-sc-soldier
  weight: 20
  displayWeight: 20
  setPreference: true
  newPlayerMessage: false
  access:
  - Pirate
  accessGroups:
  - GeneralAccess
  special:
  - !type:AddComponentSpecial
    components:
    - type: AutoPirate
    - type: SpecialSectorStationRecord # must be given on spawn
      recordGeneration: FalseRecord
    - type: Company
      companyName: StormCreed
    - type: DisableSuitSensors
  - !type:AddImplantSpecial
    implants: [ FreelanceTrackingImplant ]
  - !type:GiveItemOnHolidaySpecial # Even pirates get a piece of cake.
    holiday: FrontierBirthday
    prototype: FrontierBirthdayGift

- type: startingGear
  id: SCSoldierGear
  equipment:
    belt: ClothingBeltUtility
    pocket1: BaseStormCreedUplink10
  storage:
    back:
    - AppraisalTool

- type: chameleonOutfit
  id: SCSoldierChameleonOutfit
  job: StormCreedSoldier
