    gloves: ClothingHandsRDOutpostTypan
    id: SyndiPDARD
    back: ClothingBackpackSyndicateFilled
    jumpsuit: ClothingUniformJumpsuitSyndieFormal
    belt: ClothingBeltAssaultOutpostTypan

- type: chameleonOutfit
