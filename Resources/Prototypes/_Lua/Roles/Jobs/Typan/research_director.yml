- type: job
  id: OutpostTypanRD
  name: job-name-typan-rd
  playTimeTracker: JobOutpostSyndicateRD
  salary: 45000
  description: Директор исследований из далёкого космоса.
  startingGear: SyndicateRD
  icon: "JobIconSyndicateRD"
  supervisors: job-supervisors-typan-syndicate
  canBeAntag: false
  hideConsoleVisibility: true
  requirements:
  - !type:RoleTimeRequirement
    role: JobHeadOfPersonnel
    time: 72000 # 20h
  - !type:DepartmentTimeRequirement
    department: OutpostSyndicate
    time: 72000 # 20h
    # - !type:DepartmentTimeRequirement
    #   department: Security
    #   time: 32000
    # - !type:DepartmentTimeRequirement
    #   department: Civilian
    #   time: 73000
    # - !type:DepartmentTimeRequirement
    #   department: Frontier
    #   time: 83000
    # - !type:OverallPlaytimeRequirement
    #   time: 150000
  access:
  - SyndicateAgent
  - NuclearOperative
  - ResearchDirectorTypan
  accessGroups:
  - AllAccess
  special:
  - !type:AddImplantSpecial
    implants: [ DeathAcidifierImplantLWTypan ]
  - !type:AddComponentSpecial
    components:
      - type: Company
        companyName: Syndicate
      - type: SpecialSectorStationRecord
        recordGeneration: FalseRecord
      - type: MailDisabled
      - type: NpcFactionMember
        factions:
        - LuaNordFoll
  - !type:AddImplantSpecial
    implants: [ TrackingImplantNordfoll ]

- type: startingGear
  id: SyndicateRD
  equipment:
    eyes: ClothingEyesGlassesHiddenSecurity
    ears: ClothingHeadsetAltOutpostTypan
