    role: JobPilot
    time: 36000 # 20h
  - !type:RoleTimeRequirement
    role: JobPassenger
    time: 36000 # 20h
  - !type:RoleTimeRequirement
    role: JobFrontierEngineer
    time: 36000 # 20h
  - !type:DepartmentTimeRequirement
    department: Medical
    time: 36000 # 20h
