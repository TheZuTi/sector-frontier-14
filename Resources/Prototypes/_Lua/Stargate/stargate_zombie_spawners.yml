      weight: 0.15

- type: entity
  parent: MarkerBase
  id: SpawnMobZombieStargate
  name: Stargate zombie spawner
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    layers:
    - state: green
    - state: ai
  - type: EntityTableSpawner
    offset: 0
    table: !type:NestedSelector
      tableId: StargateZombieMobTable
      prob: 1.00

