- type: constructionGraph
  id: AncientMachineFrame
  start: start
  graph:
    - node: start
      edges:
        - to: missingWires
          completed:
            - !type:SetAnchor
              value: false
          steps:
            - material: SteelOre
              amount: 8
              doAfter: 3

    - node: missingWires
      entity: AncientUnfinishedFrame
      actions:
        - !type:EmptyAllContainers
      edges:
        - to: frameReady
          conditions:
            - !type:EntityAnchored
          steps:
            - material: Cable
              amount: 1
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: SteelOre1
              amount: 3
            - !type:DeleteEntity
          steps:
            - tool: Screwing
              doAfter: 2

    - node: frameReady
      entity: AncientMachineFrame
      actions:
        - !type:AddContainer
          container: machine_parts
        - !type:AddContainer
          container: machine_board
        - !type:MachineFrameRegenerateProgress
      edges:
        - to: machine
          conditions:
            - !type:EntityAnchored
            - !type:NoUnstackableInTileGraph
            - !type:MachineFrameComplete
              guideIconBoard:
                sprite: Objects/Misc/module.rsi
                state: id_mod
              guideIconParts:
                sprite: _NF/Objects/Misc/stock_parts.rsi
                state: scan_module
          steps:
            - tool: Screwing
              doAfter: 0.5

        - to: frameReady
          conditions:
            - !type:EntityAnchored
            - !type:ContainerNotEmpty
              container: machine_board
          steps:
            - tool: Prying
              doAfter: 2
              completed:
                - !type:EmptyAllContainers
                - !type:MachineFrameRegenerateProgress

        - to: missingWires
          conditions:
            - !type:EntityAnchored
            - !type:ContainerEmpty
              container: machine_board
              examineText: construction-condition-machine-container-empty
          completed:
            - !type:SpawnPrototype
              prototype: CableApcStack1
          steps:
            - tool: Cutting
              doAfter: 0.25

    - node: machine
      entity: !type:BoardNodeEntity { container: machine_board }
      edges:
        - to: frameReady
          completed:
            - !type:RaiseEvent
              event: !type:MachineDeconstructedEvent
              broadcast: false
          conditions:
            - !type:EntityAnchored
            - !type:WirePanel
          steps:
            - tool: Prying
              doAfter: 2
