- type: pointOfInterest
  id: AsteroidTradeOutpost
  parent: BasePOI
  name: 'Чёрный Рынок'
  minimumDistance: 2500
  maximumDistance: 3500
  spawnGroup: AsteroidMarketStation
  gridPath: /Maps/_Lua/POI/BlackMarket.yml
  addComponents:
  - type: RadarBlipIcon
    icon: /Textures/_Lua/Interface/Radar/black_market.png
    scale: 1.2
    allowWhenHidden: true
  - type: IFF
    color: "#d93204"
  - type: ProtectedGrid
    preventArtifactTriggers: true
  - type: SolarPoweredGrid
    trackOnInit: true
    doNotCull: true
  - type: WorldGenDistanceCarver
    distanceThresholds:
      - maxDistance: 500
        prob: 0.0
      - maxDistance: 1000
        prob: 0.3

- type: gameMap
  id: AsteroidTradeOutpost
  mapName: 'Чёрный Рынок'
  mapPath: /Maps/_Lua/POI/BlackMarket.yml
  minPlayers: 0
  stations:
    AsteroidTradeOutpost:
      stationProto: MarketFrontierOutpost
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Trade Outpost'
        - type: ExtraStationInformation #Lua
          iconPath: /Textures/Structures/Wallmounts/flags.rsi/pirate_flag.png
          stationSubtext: 'frontier-lobby-blackmarket-subtext'
          stationDescription: 'frontier-lobby-blackmarket-description'
        - type: StationDeadDrop
          maxDeadDrops: 3
        - type: TradeCrateDestination
          destinationProto: Trade
        - type: StationJobs
          availableJobs:
            Contractor: [ -1, -1 ]
            Mercenary: [ -1, -1 ]
