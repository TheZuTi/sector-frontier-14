# for StormCreed
- type: gameMap
  id: Murena
  mapName: 'SC-RUST/MUR3NA-5.5'
  mapPath: /Maps/_Lua/Maps/Murena.yml
  isGrid: true
  minPlayers: 0
  stations:
    Murena:
      stationProto: StandardPiratesVessel
      components:
        - type: RadarBlipIcon
          icon: /Textures/_Lua/Interface/Radar/space-station.png
          scale: 1.2
          allowWhenHidden: true
        - type: MailStationDisabled
        - type: StationNameSetup
          mapNameTemplate: 'SC-RUST/MUR3NA-5.5'
        - type: ExtraStationInformation
          iconPath: /Textures/Structures/Wallmounts/flags.rsi/Stormcreed_flag.png
          stationSubtext: 'stormcreed-lobby-outpost-subtext'
          stationDescription: 'stormcreed-lobby-outpost-description'
        - type: StationJobs
          availableJobs:
            StormCreedCaptain: [ 1, 1 ]
            StormCreedFirstmate: [ 2, 2 ]
            StormCreedSoldier: [ 6, 6 ]

- type: gameMap
  id: CoveLua
  mapName: 'Аванпост Пиратов'
  mapPath: /Maps/_Lua/Maps/tortuga.yml
  isGrid: true
  minPlayers: 0
  stations:
    Cove:
      stationProto: StandardPiratesVessel
      components:
        - type: RadarBlipIcon
          icon: /Textures/_Lua/Interface/Radar/space-station.png
          scale: 1.2
          allowWhenHidden: true
        - type: MailStationDisabled
        - type: StationNameSetup
          mapNameTemplate: 'Аванпост Пиратов'
        - type: ExtraStationInformation
          iconPath: /Textures/Structures/Wallmounts/flags.rsi/pirate_flag.png # used the biggest one, looks better when downscaling than upscaling
          stationSubtext: 'pirate-lobby-outpost-subtext'
          stationDescription: 'pirate-lobby-outpost-description'
        - type: StationJobs
          availableJobs:
            NFPirateCaptain: [ 1, 1 ]
            NFPirateFirstMate: [ 1, 1 ]
            NFPirate: [ 3, 3 ]
