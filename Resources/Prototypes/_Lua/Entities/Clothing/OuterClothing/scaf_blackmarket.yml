- type: entity
  parent: [ClothingOuterHardsuitBase, BaseC3SyndicateContraband, HardsuitIdentify]
  id: ClothingOuterHardsuitWarlord
  name: Warlord Elite Hardsuit
  description: Довольно дорогая модель легкого боевого скафандра, не так давно появившаяся на Черном Рынке. Краска цвета хаки не имеет ни одного скола.
  suffix: BlackMarket, Light, Standart
  components:
  - type: Sprite
    sprite: _Mono/Clothing/OuterClothing/Hardsuits/merc_warlordsuit.rsi
  - type: Item
    size: Huge
  - type: Clothing
    sprite: _Mono/Clothing/OuterClothing/Hardsuits/merc_warlordsuit.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.05
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.5
  - type: Armor
    modifiers:
      coefficients:
        #Mechanical 45/45/30//45/45//30/30//30/5
        Blunt: 0.55
        Slash: 0.55
        Piercing: 0.7
        #Physical
        Heat: 0.55
        Radiation: 0.55
        #Special
        Shock: 0.7
        Caustic: 0.7
  - type: StaminaResistance
    damageCoefficient: 0.7
  - type: ClothingSpeedModifier
    walkModifier: 0.95
    sprintModifier: 0.95
  - type: HeldSpeedModifier
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuitWarlord
  - type: StaticPrice
    price: 750
    vendPrice: 2500

