- type: entity
  parent: [ClothingOuterHardsuitBase, BaseC3SyndicateContraband]
  id: LuaClothingOuterHardsuitPirateEVA
  name: Модифицированный скафандр ВКД
  description: Скафандр ВКД, покрашенный и закатанный в пулестойкую броню в кустарных условиях.
  suffix: Pirate, Heavy, Special
  components:
  - type: Sprite
    sprite: _Lua/Clothing/OuterClothing/SCHardsuits/heavy_special.rsi
  - type: Item
    size: Huge
  - type: Clothing
    sprite: _Lua/Clothing/OuterClothing/SCHardsuits/heavy_special.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.05
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.3
  - type: Armor
    modifiers:
      coefficients:
        #Mechanical 40/40/60//40/40//60/60//70/20
        Blunt: 0.6
        Slash: 0.6
        Piercing: 0.4
        #Physical
        Heat: 0.6
        Radiation: 0.6
        #Special
        Shock: 0.4
        Caustic: 0.4
  - type: StaminaResistance
    damageCoefficient: 0.3
  - type: ClothingSpeedModifier
    walkModifier: 0.8
    sprintModifier: 0.8
  - type: HeldSpeedModifier
  - type: ToggleableClothing
    clothingPrototype: LuaClothingHeadHelmetHardsuitPirateEVA
  - type: StaticPrice
    price: 750
    vendPrice: 2500

