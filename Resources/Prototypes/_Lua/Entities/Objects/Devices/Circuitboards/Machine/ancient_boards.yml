- type: entity
  id: AncientGeneratorCircuitboard
  parent: BaseMachineCircuitboard
  name: плата древнего генератора
  description: Самодельная машинная плата из обожжённых руд. Позволяет собрать древний генератор.
  components:
    - type: Sprite
      state: std_mod
    - type: MachineBoard
      prototype: AncientGenerator
      stackRequirements:
        SteelOre: 5
        Coal: 3
    - type: Construction
      graph: AncientGeneratorBoard
      node: done

