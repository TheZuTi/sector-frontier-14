- type: entity
  id: AncientCircuitImprinterCircuitboard
  parent: BaseMachineCircuitboard
  name: плата древнего принтера схем
  description: Плата для древнего принтера схем. Позволяет печатать платы машин.
  components:
    - type: Sprite
      state: std_mod
    - type: MachineBoard
      prototype: AncientCircuitImprinter
      requirements:
        MatterBin: 1
        Manipulator: 1
    - type: PhysicalComposition
      materialComposition:
        Steel: 100

