- type: entity
  parent: MarkerBase
  id: ERCPlanFolderSpawner
  components:
  - type: Sprite
    layers:
    - state: pink
    - sprite: Objects/Misc/folders.rsi
      state: folder-erc
  - type: RandomSpawner
    prototypes:
    - BoxFolderERCPlanChertalet
    - BoxFolderERCPlanChilipizdriki
    - BoxFolderERCPlanEinsteinIsland
    chance: 1.0
    offset: 0.0

- type: entity
  id: BoxFolderERCPlanChertalet
  parent: BoxBase
  name: Папка Директора Исследований
  components:
  - type: Sprite
    sprite: Objects/Misc/folders.rsi
    layers:
    - state: folder-erc
    - state: folder-base
  - type: StorageFill
    contents:
    - id: ERCPlanChertalet
  - type: Item
    sprite: Objects/Misc/folders.rsi
    size: Small
    shape: null
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,4,3
    whitelist:
      tags:
      - Document
  - type: Appearance
  - type: Tag
    tags:
    - Folder

