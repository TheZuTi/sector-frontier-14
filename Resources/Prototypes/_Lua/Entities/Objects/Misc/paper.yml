          [head=3]Экспедиционно-Исследовательский Корпус Nanotrasen[/head]
      ЦК-КОМ
      ═════════════════════════════════════
      [bold]Цель смены[/bold]
      ═════════════════════════════════════
      Составитель документа: Мария Рогозина
      Должность составителя: Оператор Центрального Командования
      Настоящим документом Центральное командование постановляет:
      Утвердить целью на смену следующую задачу:
      Постройка камер содержания для фауны; Доставка и исследование образцов фауны Сектора Фронтир.
      Техническое задание:
      - Необходимо построить не менее 5 камер для содержания фауны;
      - Камеры для содержания фауны должны иметь площадь не менее 9 квадратных метров;
      - Камеры должны быть снабжены:
        - Собственной системой энергообеспечения и освещения;
        - Атмосферой и окружающими условиями, сходными с естественными условиями обитания фауны;
        - Окнами для наблюдения за поведением особей;
        - Запасом медикаментов и кабинетом ветеринара для ухода и исследования особей;
      - Необходимо найти, транспортировать в камеры содержания и исследовать по 3 особи не менее 5 различных видов фауны, обитающих в Секторе Фронтир и Мирах Звездных Врат;
      - Необходимо назначить на должность Ветеринар одного сотрудника Медицинского Центра, в обязанности которого входит: обеспечение необходимых для поддержания жизни условий особей; контроль за физическим состоянием особей;
      - В процессе транспортировки особям необходимо обеспечить комфорт и безопасность;
      - Сотруднику, ответственному за уход за особями необходимо составить и отправить на факс Центрального Командования отчёт о физическом состоянии каждой особи вместе с отчётом о выполнении Цели;
      - Сотруднику, ответственному за исследование особей необходимо составить подробный отчёт о проведении исследований по образцу, приложенному к Настоящему документу.
      - Необходимо установить: Необходимые для жизни условия; Состав крови и мышечных тканей; Агрессивность; Отличительные особенности строения тела для каждого из найденных видов фауны;
      За Командованием Сектора остается право запросить дополнительную информацию или корректировки у Центрального Командования путем факсимальной связи.
      При успешном выполнении цели каждому сотруднику, учавствовавшему в ее выполнении выдать премию в размере, не превышающем 75 000 (семьдесят пять тысяч) кредитов.
      Настоящий документ является разрешением на снятие средств со счета Аванпоста ЭИК с целью выдачи премий и оплаты контрактов, заключенных с гражданскими лицами для выполнения цели.
      При наличии контрактов, оплаченных со счета Аванпоста ЭИК, Директору Исследований приказывается направить на факс Центрального Командования копии документов, удостоверяющих подлинность всех контрактов.
      Центральное Командование напоминает, что кража или необоснованные траты средств со счета Аванпоста ЭИК [color=#C8363D][bold]караются по статье 505 "Особо крупное хищение".[/bold][/color]
      ═════════════════════════════════════
      [italic]Место для печатей[/italic]

