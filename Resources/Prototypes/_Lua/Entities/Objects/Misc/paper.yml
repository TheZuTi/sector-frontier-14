          [head=3]Экспедиционно-Исследовательский Корпус Nanotrasen[/head]
      ЦК-КОМ
      ═════════════════════════════════════
      [bold]Цель смены[/bold]
      ═════════════════════════════════════
      Составитель документа: Мария Рогозина
      Должность составителя: Оператор Центрального Командования
      Настоящим документом Центральное командование постановляет:
      Утвердить целью на смену следующую задачу:
      Исследование и освоение планетарных миров системы Звёздных Врат.
      Техническое задание:
      - Организовать не менее 2 экспедиционных команд составом не менее 2 человек;
      - Снарядить каждого члена экспедиционных команд следующим снаряжением:
        - Огнестрельное и холодное оружие, а так же запас боеприпасов к ним; Бронежилет и/или скафандр с оборудованием для их использования;
        - Полный набор инструментов, изолировочные перчатки, инженерные очки;
        - Физические медикаменты и жидкие лекарства, а так же инструменты для их использования;
        - Оборудование для разработки горных пород, надежный источник света;
        - Планетарная карта и диск записи для нее; диск адресных координат Звёздных Врат с записанным на него адресом Барьерных Врат;
        - Оборудование для анализа состава атмосферы;
      - Силами экспедиционных команд Исследовать не менее 10 планетарных миров системы Звёздных Врат;
      - Составить и направить на факс Центрального Командования вместе с отчетом о выполнении цели отчёты об исследованных мирах по приложенному к данному документу Шаблону;
      - Построить Опорный Аванпост в одном из исследованных миров, выбранном на усмотрение Директора Исследований; Аванпост должен быть оборудован:
        - Оружейной и складом боеприпасов;
        - Инженерным отсеком, обеспечивающим постоянное электропитание, свет и пригодную для дыхания атмосферу на всей территории Аванпоста;
        - Медицинским блоком;
        - Кухней и баром, способными покрыть потребности персонала в провианте.
      За Командованием Сектора остается право запросить дополнительную информацию или корректировки у Центрального Командования путем факсимальной связи.
      При успешном выполнении цели каждому сотруднику, учавствовавшему в ее выполнении выдать премию в размере, не превышающем 75 000 (семьдесят пять тысяч) кредитов.
      Настоящий документ является разрешением на снятие средств со счета Аванпоста ЭИК с целью выдачи премий и оплаты контрактов, заключенных с гражданскими лицами для выполнения цели.
      При наличии контрактов, оплаченных со счета Аванпоста ЭИК, Директору Исследований приказывается направить на факс Центрального Командования копии документов, удостоверяющих подлинность всех контрактов.
      Центральное Командование напоминает, что кража или необоснованные траты средств со счета Аванпоста ЭИК [color=#C8363D][bold]караются по статье 505 "Особо крупное хищение".[/bold][/color]
      ═════════════════════════════════════
      [italic]Место для печатей[/italic]

