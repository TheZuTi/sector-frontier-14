- type: entity
  id: BaseCartridgeLightRifle
  name: cartridge (.30 rifle)
  parent: [ BaseCartridge, BaseC1Contraband ]
  abstract: true
  components:
  - type: Tag
    tags:
    - Cartridge
    - CartridgeLightRifle
  - type: CartridgeAmmo
    deleteOnSpawn: true
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Casings/ammo_casing.rsi
    layers:
    - state: base
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: StaticPrice
    price: 1

