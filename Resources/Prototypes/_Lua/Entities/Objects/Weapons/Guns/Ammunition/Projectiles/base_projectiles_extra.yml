- type: entity
  id: PelletClusterRubber
  name: pellet (ball, rubber)
  categories: [ HideSpawnMenu ]
  parent: BaseBullet
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    state: buckshot
  - type: Projectile
    deleteOnCollide: false
    damage:
      types:
        Blunt: 4
  - type: StaminaDamageOnCollide
    damage: 55
  - type: TimedDespawn
    lifetime: 0.25

- type: entity
  id: PelletClusterLethal
  name: pellet (ball, lethal)
  categories: [ HideSpawnMenu ]
  parent: BaseBullet
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    state: buckshot
  - type: Projectile
    deleteOnCollide: false
    damage:
      types:
        Piercing: 45
  - type: TimedDespawn
    lifetime: 0.25

- type: entity
  id: PelletClusterIncendiary
  name: pellet (ball, incendiary)
  categories: [ HideSpawnMenu ]
  parent: BaseBulletIncendiary
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    state: buckshot-flare
  - type: Projectile
    deleteOnCollide: false
    damage:
      types:
        Blunt: 1
        Heat: 2
  - type: IgniteOnCollide
    fireStacks: 1
    count: 10
  - type: TimedDespawn
    lifetime: 0.25

- type: entity
  id: PelletGlass
  name: glass shard
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    noRot: false
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
    - state: shard
      shader: unshaded
  - type: EmbeddableProjectile
    deleteOnRemove: true
  - type: Projectile
    deleteOnCollide: false
    damage:
      types:
        Slash: 25

- type: entity
  id: PelletClusterLessLethal
  name: pellet (ball, less lethal)
  categories: [ HideSpawnMenu ]
  parent: BaseBullet
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    state: buckshot
  - type: Projectile
    deleteOnCollide: false
    damage:
      types:
        Piercing: 5
  - type: TimedDespawn
    lifetime: 0.25

- type: entity
  id: PelletGrapeshot
  name: grapeshot pellet
  categories: [ HideSpawnMenu ]
  parent: BaseBullet
  components:
  - type: Sprite
    noRot: false
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
    - state: grapeshot
      shader: unshaded
  - type: Projectile
    damage:
      types:
        Piercing: 25
        Structural: 5

- type: entity
  id: PelletShotgunFlare
  name: pellet (.50 flare)
  categories: [ HideSpawnMenu ]
  components:
  - type: Physics
    bodyType: Dynamic
    fixedRotation: false
  - type: EmbeddableProjectile
    deleteOnRemove: true
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.1,-0.1,0.1,0.1"
        mask:
          - BulletImpassable
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    state: buckshot-flare
  - type: IgnitionSource
    ignited: true
    temperature: 1000
  - type: TimedDespawn
    lifetime: 240
  - type: AmbientSound
    enabled: true
    volume: 0
    range: 7
    sound:
      path: /Audio/Items/Flare/flare_burn.ogg
      params:
        loop: true
  - type: IgniteOnCollide
    fireStacks: 1
  - type: PointLight
    enabled: true
    color: "#FF8080"
    radius: 15.0
    energy: 9.0
  - type: Projectile
    deleteOnCollide: false
    damage:
      types:
        Heat: 5

- type: entity
  id: BulletFoam
  description: I hope you're wearing eye protection.
  name: foam dart
  parent: BaseItem
  components:
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PolygonShape
          vertices:
            - -0.05,-0.15
            - -0.05,0.25
            - 0.05,-0.15
            - 0.05,0.25
        density: 20
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
  - type: Tag
    tags:
      - BulletFoam
      - Trash
  - type: Ammo
  - type: Sprite
    sprite: Objects/Fun/Foam/foam_crossbow.rsi
    layers:
      - state: foamdart
  - type: EmbeddableProjectile
    removalTime: .2
  - type: ThrowingAngle
    angle: 180
  - type: LandAtCursor
