# Base
- type: entity
  id: MedipenCaseMechFilled
  parent: SyringeCase
  name: Кейс с механическими иньекторами
  description: Стальной портсигар с красной маркировкой и 6 иньекторами внутри.
  suffix: Filled
  components:
  - type: Sprite
    sprite: _Lua/Objects/Specific/Chemistry/pencasemech.rsi
    layers:
    - state: closed
    - state: open
      map: ["openLayer"]
      visible: false
    - state: filled-1
      map: ["filled-1"]
      visible: false
    - state: filled-2
      map: ["filled-2"]
      visible: false
    - state: filled-3
      map: ["filled-3"]
      visible: false
  - type: Tag
    tags:
    - CigPack
  - type: StorageFill
    contents:
    - id: BruteAutoInjector
      amount: 6
  - type: ItemCounter
    count:
      components: [Item]
    composite: true
    layerStates:
    - filled-1
    - filled-2
    - filled-3
  - type: Storage
    grid:
    - 0,0,2,1

