- type: entity
  parent: JetInjector
  id: VipJetInjector
  name: vip jet injector
  description: A premium advanced jet injector for VIP medical operations.
  components:
  - type: Sprite
    sprite: _Lua/Objects/Specific/Medical/vip_jetinjector.rsi
    layers:
    - state: jetinjector_base
      map: [ "enum.SolutionContainerLayers.Base" ]
    - state: jetinjector_filled1
      map: [ "enum.SolutionContainerLayers.Fill" ]
      visible: false
  - type: Item
    sprite: _Lua/Objects/Specific/Medical/vip_jetinjector.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 10
  - type: SolutionContainerVisuals
    maxFillLevels: 4
  - type: Injector
    activeModeProtoId: VipJetInjectorDynamicMode
    allowedModes:
    - VipJetInjectorDynamicMode
    - VipJetInjectorInjectMode
