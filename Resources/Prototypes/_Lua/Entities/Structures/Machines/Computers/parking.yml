- type: entity
  parent: ComputerShipyardBase
  id: ComputerShipyardParking
  name: консоль парковки
  description: Используется для парковки кораблей
  components:
  - type: Sprite
    sprite: _Lua/Structures/Machines/computers.rsi
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
    - map: ["computerLayerScreen"]
      state: transferSyndicate
    - map: ["computerLayerKeys"]
      state: tech_key
  - type: ActivatableUI
    key: enum.ShipyardConsoleUiKey.Parking
  - type: UserInterface
    interfaces:
      enum.ShipyardConsoleUiKey.Parking:
        type: ParkingConsoleBoundUserInterface
  - type: ShipyardConsole
    parkingConsole: true