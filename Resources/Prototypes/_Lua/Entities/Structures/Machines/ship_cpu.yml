- type: entity
  id: ShipCpuStation
  parent: [BaseStructureDisableToolUse, BaseStructureIndestructible, BaseShipCpu]
  name: станционный CPU
  description: Главный вычислительный блок станции. Снимает все ограничения на расширение сетки. Намертво прикреплён к станции.
  suffix: AdminOnly
  components:
  - type: ShipCpu
    unlimited: true
  - type: Sprite
    netsync: false
    noRot: true
    sprite: _Lua/Structures/Machines/ship_cpu.rsi
    layers:
    - map: ["base"]
      state: ship_cpu_station
  - type: PointLight
    radius: 1.5
    energy: 1.5
    color: "#e5c838"
    enabled: false
  - type: StaticPrice
    price: 0
