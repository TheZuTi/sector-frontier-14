- type: entity
  id: BaseShipCpu
  abstract: true
  parent: [BaseMachinePowered, ConstructibleMachine]
  name: корабельный CPU
  description: Вычислительный блок управления шаттлом. Определяет максимально допустимый размер корабля.
  placement:
    mode: SnapgridCenter
  components:
  - type: ApcPowerReceiver
    powerLoad: 300
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
        hard: false
  - type: Sprite
    netsync: false
    noRot: true
    sprite: _Lua/Structures/Machines/ship_cpu.rsi
    layers:
    - map: ["base"]
      state: ship_cpu_small
  - type: Appearance
  - type: LitOnPowered
  - type: PointLight
    radius: 1.5
    energy: 1.5
    color: "#b0b0b0"
    enabled: false
  - type: ShipCpu
  - type: StaticPrice
    price: 2000

- type: entity
  id: ShipCpuSmall
  parent: BaseShipCpu
  name: корабельный CPU
  description: Обеспечивает вычислительную мощность для шаттла класса Small. Максимум 441 тайл, сторона до 21.
  components:
  - type: ShipCpu
    maxTiles: 441
    maxSide: 21
  - type: Machine
    board: ShipCpuSmallMachineCircuitboard
  - type: Sprite
    netsync: false
    noRot: true
    sprite: _Lua/Structures/Machines/ship_cpu.rsi
    layers:
    - map: ["base"]
      state: ship_cpu_small
  - type: PointLight
    radius: 1.5
    energy: 1.5
    color: "#38e551"
    enabled: false

