- type: entity
  parent: VendingMachine
  id: GateVending
  name: Врат-О-Мат
  description: Ваш ключ к путешествию по планетам!
  components:
  - type: VendingMachine
    pack: GateVendingInventory
    offState: off
    brokenState: broken
    normalState: normal-unshaded
  - type: Sprite
    sprite: _Lua/Structures/Machines/VendingMachines/GateVend.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: PointLight
    radius: 1.5
    energy: 1.6
    color: "#4b93ad"