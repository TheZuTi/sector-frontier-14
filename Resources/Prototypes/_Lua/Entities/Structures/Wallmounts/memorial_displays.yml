- type: entity
  parent: PosterBase
  id: BaseMemorialDisplayLua
  name: Базовая мемориальная экспозиция
  abstract: true
  description: Базовая экспозиция памяти и благодарности.
  components:
  - type: ActivatableUI
    key: enum.MemorialDisplayUiKey.Key
  - type: UserInterface
    interfaces:
      enum.MemorialDisplayUiKey.Key:
        type: MemorialDisplayBoundUserInterface
  - type: Godmode
  - type: MemorialDisplay
    displayName: Мемориальная экспозиция
    displayDescription: "[italic]Память и благодарность живут в каждом имени.[/italic]"

- type: entity
  parent: BaseMemorialDisplayLua
  id: MemorialDisplayPatrons
  name: Мемориальная экспозиция Меценатов
  description: Экспозиция благодарности меценатам за поддержку проекта.
