- proto: PlushieRainbowLizard
  entities:
  - uid: 5553
    components:
    - type: MetaData
      desc: У неё слегка свисшие ушки и изумрудные глаза, которые сверкают жизнелюбием и теплотой. Подчёркивает образ её шипастый, милый хвостик, плавно колышущийся при движении. Серебряная цепочка нежно обвивала правую кисть, на которой покоился медальон с выгравированной надписью «Тёрская». Излучающая атмосферу расслабленности и гармонии, Эри приятно пахнет смесью мягкого аромата пунктураза и ромашки.
      name: плюшевая Эри
    - type: Transform
      pos: -5.488515,-9.566085
      parent: 1
