      desc: Сделан лучшими мастерами-кукольниками, данная игрушка имеет превосходную детализацию без единого огреха. Его янтарные глаза переливаются на свету словно пламя, а мех мягкий словно облачко. Пахнет дилометом, и… Ромашками?... И почему вам кажется что он хочет вырастить армию клонов?...
