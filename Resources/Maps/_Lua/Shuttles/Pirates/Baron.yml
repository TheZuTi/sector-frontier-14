    - type: Paper
      content: >+
        В звёздном небе, в тайной мгле,

        Космический пират плывёт вдали,

        На корабле из света и теней,

        Где мечты сражаются с судьбой своей.


        Он с астероидов собрал мечты,

        На парусах — кометы, как сны,

        В поисках богатств, среди звёздных врат,

        Смелый и безстрашный наш космический пират.

  - uid: 1227
    components:
    - type: MetaData
      name: Состояние пациента
    - type: Transform
      pos: -7.159355,-17.280277
      parent: 1
    - type: Paper
      content: "Отчёт о состоянии пациента\r\n\r\nПациент: Рамирез Джоали  \r\nВозраст: Возраст 26 года.\r\n\nМесто происшествия: NF-743\nПричина обращения: Ранение в результате участи в космической баталии\r\n\r\n---Общее состояние пациента:\r\nПациент находится в критическом, но стабильном состоянии. Сознание частично сохранено, пациент реагирует на болевые раздражители. \r\n Визуальный осмотр:\r\n- Лицо: Явные следы повреждений — сильные синяки и порезы. Шрамы от предыдущих боевых столкновений.\r\n- Тело: На груди и боках нескольких глубоких ранения, одно из которых проникающее, с характерным поражением тканей.\r\n\r\n Лабораторные исследования:\r\n- Анализ крови показывает признаки анемии и нарушения свертываемости.\r\n- Высокий уровень лейкоцитов, что может указывать на воспаление или инфекцию.\r\nПроведенные процедуры:\r\n- Введение противоболевого средства и анестезирующего геля на открытые раны.\r\n- Проведено первичное лечение — остановка кровотечения и перевязка ран.\r\n- Запуск сканирования для обнаружения внутренних повреждений.\r\n \nРекомендации для дальнейшего лечения:\r\n1. Наблюдение за жизненными показателями каждые 15 минут.\r\n2. Поддержка уровня гидратации парентерально.\r\n3. Проведение дополнительных исследований на наличие повреждений внутренних органов.\r\n4. Подготовить медицины для доставки на более современный лечебный корабль, если состояние пациента не улучшится в ближайшие часы.\r\n\r\n"
